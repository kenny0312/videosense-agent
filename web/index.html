<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>VideoSense</title>
<meta name="theme-color" content="#0a0b0d"/>
<script>/* 首屏前定主题,防暗→亮闪烁:记忆优先,其次跟系统 */
try{var _t=localStorage.getItem('vs_theme')||(matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');
if(_t==='light'){document.documentElement.setAttribute('data-theme','light');
document.querySelector('meta[name="theme-color"]').content='#f4f6f9';}}catch(e){}</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.24.0/tabler-icons.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
<style>
  :root{
    --bg:#0a0b0d; --surface:#111418; --surface2:#181b20; --hover:#1e222833; --border:#22262d; --border2:#2c313a;
    --text:#e8ebef; --muted:#98a2ae; --hint:#69727e; --accent:#3f7bf0; --accent-soft:#6ea2ff; --accent-dim:#16233f;
    --ok:#43c88a; --warn:#e0a23b; --danger:#e05a5a; --radius:10px; --card-radius:14px;
    --pro:#b79df2; --pro-dim:#241d33;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font:15px/1.6 system-ui,"Segoe UI",-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
  .shell{display:flex;height:100vh;overflow:hidden}
  .app{flex:1;min-width:0;display:flex;flex-direction:column}
  i.ti{font-size:inherit;line-height:1;vertical-align:-.06em}
  /* ── sidebar ── */
  .sidebar{width:270px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
  .shell.nosb .sidebar{display:none}
  .sidebar .sb-top{padding:12px}
  .newbtn{width:100%;justify-content:center;font-size:13.5px;padding:9px 12px;font-weight:500}
  .sidebar .sb-h{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--hint);padding:12px 14px 5px}
  .convlist{flex:1;overflow-y:auto;padding:2px 8px 12px}
  .conv{position:relative;display:flex;align-items:center;gap:8px;padding:9px 10px 9px 13px;border-radius:9px;cursor:pointer;color:var(--muted);transition:background .13s,color .13s}
  .conv:hover{background:var(--surface2);color:var(--text)}
  .conv.active{background:var(--accent-dim);color:var(--text)}
  .conv.active::before{content:"";position:absolute;left:3px;top:9px;bottom:9px;width:2.5px;border-radius:2px;background:var(--accent-soft)}
  .conv .title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13.5px}
  .conv .del{opacity:0;color:var(--hint);font-size:16px;line-height:1;padding:2px 4px;border-radius:6px;transition:opacity .13s,color .13s}
  .conv:hover .del{opacity:.6}
  .conv .del:hover{color:var(--danger);opacity:1;background:var(--hover)}
  .sb-empty{color:var(--hint);font-size:13px;text-align:center;line-height:1.7;padding:26px 12px}
  .icon-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:5px 8px;border-radius:8px;line-height:1;transition:background .13s,color .13s}
  .icon-btn:hover{color:var(--text);background:var(--surface2)}
  .scrim{display:none}
  @media(max-width:720px){
    .sidebar{position:fixed;z-index:30;top:0;bottom:0;left:0;width:80%;max-width:300px;box-shadow:2px 0 30px rgba(0,0,0,.6)}
    .shell:not(.nosb) .scrim{display:block;position:fixed;inset:0;z-index:25;background:rgba(0,0,0,.5)}
  }
  header{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--border)}
  header .logo{width:29px;height:29px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px}
  header h1{font-size:15.5px;font-weight:600;margin:0;letter-spacing:-.01em}
  header .sess{font-size:12.5px;color:var(--hint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:40vw}
  header .spacer{flex:1}
  .btn{background:var(--surface2);color:var(--muted);border:1px solid var(--border2);border-radius:9px;
    padding:6px 12px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:color .13s,border-color .13s,background .13s}
  .btn:hover{color:var(--text);border-color:#3a414c;background:var(--hover)}
  .thread{flex:1;overflow-y:auto;padding:20px 18px;display:flex;flex-direction:column;gap:16px;align-items:center}
  .thread>*{width:100%;max-width:820px}
  .row{display:flex;gap:11px;animation:rise .22s ease}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .row.user{justify-content:flex-end}
  .bubble{max-width:80%;padding:10px 14px;border-radius:15px 15px 4px 15px;white-space:pre-wrap;word-break:break-word;font-size:14px}
  .user .bubble{background:var(--accent-dim);color:#d7e4ff}
  .av{width:27px;height:27px;border-radius:8px;background:#151920;display:flex;align-items:center;justify-content:center;color:var(--accent-soft);font-size:14px;flex-shrink:0}
  .card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:13px 16px;max-width:calc(100% - 38px)}
  .answer{font-size:14px;line-height:1.65;word-break:break-word}
  /* markdown 渲染排版(C:结论先行/编号列表/加粗数字的层级) */
  .answer p{margin:0 0 8px}
  .answer p:last-child{margin-bottom:0}
  .answer strong{font-weight:600;color:#f0f3f7}
  .answer h1,.answer h2,.answer h3{font-size:14.5px;font-weight:600;margin:12px 0 6px;color:#eef1f5}
  .answer h1:first-child,.answer h2:first-child,.answer h3:first-child{margin-top:0}
  .answer ul,.answer ol{margin:4px 0 8px;padding-left:22px}
  .answer li{margin:3px 0}
  .answer li::marker{color:var(--muted)}
  .answer code{background:var(--surface2);border-radius:5px;padding:1px 5px;font:12.5px ui-monospace,Consolas,monospace}
  .answer pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;overflow-x:auto}
  .answer pre code{background:none;padding:0}
  .answer blockquote{border-left:3px solid var(--border);margin:6px 0;padding:2px 0 2px 12px;color:var(--muted)}
  .answer a{color:var(--accent);text-decoration:none}
  .answer a:hover{text-decoration:underline}
  .answer table{border-collapse:collapse;font-size:13px;margin:6px 0}
  .answer th,.answer td{border:1px solid var(--border);padding:5px 9px;text-align:left}
  /* inline timecode chips (post-render); seek the card's player when there is one */
  .answer .tc{font:12px/1 ui-monospace,Consolas,monospace;color:var(--accent-soft);background:#12203a;
    padding:1px 6px;border-radius:5px;font-variant-numeric:tabular-nums;white-space:nowrap}
  .answer .tc.seek{cursor:pointer;transition:background .13s}
  .answer .tc.seek:hover{background:#1a2c4d}
  .badge{font-size:11.5px;padding:3px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:5px;margin-bottom:8px}
  .badge.refused{background:#3a2526;color:#e7a3a3}
  .sub{font-size:12px;color:var(--hint);font-variant-numeric:tabular-nums}
  .chips{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:10px}
  .chip{font-size:12px;padding:3px 10px;border-radius:999px;background:var(--surface2);color:var(--muted);display:inline-flex;align-items:center;gap:5px;cursor:pointer;transition:color .13s,background .13s}
  .chip:hover{color:var(--text);background:var(--hover)}
  .lnk{font-size:12px;color:var(--accent-soft);cursor:pointer;display:inline-flex;align-items:center;gap:4px;user-select:none}
  .lnk:hover{text-decoration:underline}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
  .stat{background:var(--surface2);border-radius:10px;padding:11px 13px}
  .stat .k{font-size:12px;color:var(--muted)}
  .stat .v{font-size:22px;font-weight:600;margin-top:2px;font-variant-numeric:tabular-nums}
  /* result footer (trace, quiet, on demand) */
  .foot{display:flex;align-items:center;gap:10px;margin-top:12px;padding-top:9px;border-top:1px solid var(--border)}
  .foot .fsum{font-size:11.5px;color:var(--hint);cursor:pointer;display:inline-flex;align-items:center;gap:5px;list-style:none;font-variant-numeric:tabular-nums;transition:color .13s}
  .foot .fsum:hover{color:var(--muted)}
  .foot .fact{color:#4d5661;font-size:15px;cursor:pointer;padding:2px;border-radius:6px;transition:color .13s,background .13s;background:none;border:none}
  .foot .fact:hover{color:var(--muted);background:var(--hover)}
  details.foot-d{margin:0}
  details.foot-d>summary{list-style:none;cursor:pointer}
  details.foot-d>summary::-webkit-details-marker{display:none}
  details.foot-d .chev{transition:transform .15s}
  details.foot-d[open] .chev{transform:rotate(90deg)}
  details>summary::-webkit-details-marker{display:none}
  .disc{margin-top:9px}
  .disc>summary{cursor:pointer;font-size:12px;color:var(--hint);list-style:none;display:inline-flex;align-items:center;gap:6px}
  .disc>summary::-webkit-details-marker{display:none}
  .disc[open]>summary{color:var(--muted)}
  pre{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:10px;overflow:auto;
    font:12px/1.5 ui-monospace,"SF Mono",Consolas,monospace;color:#cdd3da;white-space:pre-wrap;word-break:break-word;margin:8px 0 0}
  .trace{margin-top:8px;display:flex;flex-direction:column;gap:1px}
  .tstep{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:3px 0}
  .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .tname{flex:1;color:var(--muted)}
  .tms{color:var(--hint);font-variant-numeric:tabular-nums}
  .chart img{max-width:100%;border-radius:10px;background:var(--surface2);border:1px solid var(--border)}
  /* P1: interactive ECharts panel + load skeleton */
  .chartpanel{border:1px solid var(--border);border-radius:12px;background:#0d1015;padding:8px 8px 4px;margin:4px 0}
  .chartpanel .echart{width:100%;height:300px}
  .chartpanel .cbar{display:flex;justify-content:flex-end;gap:12px;padding:2px 4px 2px}
  .chart-skel{height:300px;border-radius:9px;border:1px solid var(--border);
    background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);
    background-size:200% 100%;animation:cshimmer 1.3s linear infinite}
  @keyframes cshimmer{to{background-position:-200% 0}}
  @media(prefers-reduced-motion:reduce){.chart-skel{animation:none}}
  /* video grid */
  .vgrid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));margin:4px 0}
  .vcard{border:1px solid var(--border2);border-radius:12px;overflow:hidden;background:#0d1015;transition:border-color .13s}
  .vcard:hover{border-color:#39414d}
  .vcard .vhead{display:flex;align-items:center;gap:7px;padding:9px 11px;font-size:12.5px;font-weight:500;color:var(--text)}
  .vcard .vnum{font-size:10.5px;color:var(--accent-soft);background:var(--accent-dim);padding:1px 7px;border-radius:999px;flex-shrink:0;font-variant-numeric:tabular-nums}
  .vcard video{width:100%;max-height:360px;background:#000;display:block}
  .vcard .vna{padding:14px 11px;color:var(--hint);font-size:12.5px;display:flex;align-items:center;gap:7px}
  /* P3c: match-confidence chip on the video card header */
  .confchip{font-size:10px;font-weight:600;padding:1px 7px;border-radius:999px;flex-shrink:0;
    font-variant-numeric:tabular-nums;letter-spacing:.02em;text-transform:uppercase}
  .confchip.high{color:#8fd6a8;background:#16311f} .confchip.med{color:#9dbfff;background:#16233f} .confchip.low{color:#98a2ae;background:#20242b}
  /* table */
  .tbl{margin:6px 0;border:1px solid var(--border2);border-radius:12px;overflow:hidden;background:#0d1015}
  .tbl .tbar{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--border)}
  .tbl .tscroll{max-height:420px;overflow:auto}
  .tbl table{width:100%;border-collapse:collapse;font-size:13px}
  .tbl th{text-align:left;padding:8px 13px;position:sticky;top:0;background:#12161c;border-bottom:1px solid var(--border);font-weight:500;white-space:nowrap;color:var(--muted)}
  .tbl td{padding:7px 13px;border-bottom:1px solid var(--border);vertical-align:top}
  .tbl tbody tr:hover{background:var(--hover)}
  .tbl .cnum{color:var(--hint);white-space:nowrap;text-align:right;font-variant-numeric:tabular-nums;width:1%}
  .tbl th{cursor:pointer;user-select:none}
  .barcell{display:flex;align-items:center;gap:8px}
  .bar{height:6px;border-radius:3px;background:var(--surface2);min-width:44px;flex:1}
  .bar>i{display:block;height:6px;border-radius:3px;background:var(--accent)}
  /* composer */
  .composer{display:flex;justify-content:center;padding:12px 18px 16px;border-top:1px solid var(--border)}
  .cwrap{flex:1;max-width:820px;display:flex;flex-direction:column;gap:8px}
  .box{display:flex;align-items:flex-end;gap:9px;background:var(--surface);border:1px solid var(--border2);border-radius:15px;padding:9px 11px;transition:border-color .15s}
  .box:focus-within{border-color:var(--accent)}
  .box .ibtn{background:none;border:none;color:var(--hint);cursor:pointer;font-size:18px;padding:4px;border-radius:8px;line-height:1;transition:color .13s,background .13s;flex-shrink:0}
  .box .ibtn:hover{color:var(--muted);background:var(--hover)}
  textarea{flex:1;border:none;background:transparent;color:var(--text);resize:none;font:14.5px/1.5 inherit;outline:none;max-height:150px;padding:4px 0}
  textarea::placeholder{color:var(--hint)}
  .send{width:32px;height:32px;border-radius:10px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .13s,transform .08s}
  .send:hover:not(:disabled){background:#4f88f5}
  .send:active:not(:disabled){transform:scale(.94)}
  .send:disabled{opacity:.4;cursor:not-allowed}
  .cfoot{display:flex;align-items:center;justify-content:space-between;padding:0 4px}
  .propill{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 11px;border-radius:999px;cursor:pointer;background:none;border:1px solid var(--border2);color:var(--muted);line-height:1.4;transition:color .13s,border-color .13s,background .13s}
  .propill:hover{color:var(--text);border-color:#3a3550;background:var(--hover)}
  .propill.on{background:var(--pro-dim);border-color:transparent;color:var(--pro)}
  .propill:disabled{opacity:.55;cursor:default}
  .cmon{display:inline-flex;align-items:center;gap:8px}
  .cm-txt{font-size:12px;color:var(--hint);font-variant-numeric:tabular-nums}
  .empty{color:var(--hint);text-align:center;margin:auto;font-size:14px;display:flex;flex-direction:column;align-items:center;gap:14px}
  .empty .ehero{display:flex;flex-direction:column;align-items:center;gap:10px}
  .empty .eic{width:46px;height:46px;border-radius:13px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;color:var(--accent-soft);font-size:23px}
  .empty .exs{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:560px}
  .empty .ex{padding:7px 13px;border:1px solid var(--border2);border-radius:999px;cursor:pointer;color:var(--muted);font-size:13px;transition:color .13s,border-color .13s,background .13s}
  .empty .ex:hover{color:var(--text);border-color:#3a414c;background:var(--hover)}
  .think{color:var(--hint);font-size:13px;display:flex;align-items:center;gap:9px}
  .breathe{width:8px;height:8px;border-radius:50%;background:var(--accent-soft);animation:breathe 1.1s ease-in-out infinite}
  @keyframes breathe{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.15)}}
  /* ── shell redesign: sidebar buckets/search/menu/collapse/account ── */
  .sidebar{width:250px}
  .sb-top{display:flex;flex-direction:column;gap:8px}
  .sb-row1{display:flex;align-items:center;gap:6px}
  .collapse{width:30px;height:30px;flex-shrink:0;border:none;background:none;color:var(--hint);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .13s,color .13s}
  .collapse:hover{color:var(--text);background:var(--surface2)}
  .sb-search{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border2);border-radius:9px;padding:7px 10px}
  .sb-search:focus-within{border-color:var(--accent)}
  .sb-search i{color:var(--hint);font-size:15px;flex-shrink:0}
  .sb-search input{flex:1;background:none;border:none;outline:none;color:var(--text);font:13px inherit;min-width:0}
  .sb-search input::placeholder{color:var(--hint)}
  .conv .title{flex:1}
  .conv .pin-i{color:var(--pro);font-size:13px;flex-shrink:0;margin-right:-2px}
  .conv .ci{display:none;color:var(--hint);font-size:16px;flex-shrink:0}
  .conv .more{opacity:0;color:var(--hint);font-size:16px;line-height:1;padding:2px 4px;border-radius:6px;border:none;background:none;cursor:pointer;transition:opacity .12s,color .12s,background .12s}
  .conv:hover .more{opacity:.65}
  .conv .more:hover{opacity:1;color:var(--text);background:var(--hover)}
  .sb-h.pin{color:var(--pro)}
  .sb-h{position:sticky;top:0;background:var(--surface);z-index:1}
  .rowmenu{position:fixed;z-index:40;background:#12161c;border:1px solid var(--border2);border-radius:10px;padding:5px;min-width:158px;box-shadow:0 16px 40px -12px #000}
  .rowmenu button{display:flex;align-items:center;gap:9px;width:100%;background:none;border:none;color:var(--muted);font-size:13px;padding:7px 9px;border-radius:7px;cursor:pointer;text-align:left}
  .rowmenu button:hover{background:var(--hover);color:var(--text)}
  .rowmenu button.danger:hover{color:var(--danger)}
  .rowmenu i{font-size:15px}
  .rn-input{width:100%;background:var(--bg);border:1px solid var(--accent);border-radius:6px;color:var(--text);font:13px inherit;padding:6px 8px}
  .acct{display:flex;align-items:center;gap:10px;padding:10px 12px;border-top:1px solid var(--border);cursor:pointer;transition:background .13s}
  .acct:hover{background:var(--surface2)}
  .acct .ini{width:28px;height:28px;border-radius:8px;background:var(--accent-dim);color:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
  .acct .meta{flex:1;min-width:0;line-height:1.3}
  .acct .nm{font-size:12.5px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .acct .pl{font-size:11px;color:var(--pro)}
  .acct .gear{color:var(--hint);font-size:16px}
  /* collapsed icon-rail (desktop) */
  .shell.collapsed .sidebar{width:56px}
  .shell.collapsed .newbtn span,.shell.collapsed .sb-search,.shell.collapsed .sb-h,.shell.collapsed .conv .title,.shell.collapsed .conv .more,.shell.collapsed .conv .pin-i,.shell.collapsed .acct .meta,.shell.collapsed .acct .gear{display:none}
  .shell.collapsed .newbtn{padding:9px 0}
  .shell.collapsed .conv{justify-content:center;padding:9px 8px}
  .shell.collapsed .conv .ci{display:inline-flex}
  .shell.collapsed .acct{justify-content:center}
  @media(max-width:720px){.shell.collapsed .sidebar{width:80%;max-width:300px}
    .shell.collapsed .newbtn span,.shell.collapsed .sb-search,.shell.collapsed .sb-h,.shell.collapsed .conv .title,.shell.collapsed .conv .more,.shell.collapsed .acct .meta{display:revert}
    .shell.collapsed .conv{justify-content:flex-start}.shell.collapsed .conv .ci{display:none}}
  /* ── composer redesign: + attach menu, chips, tier, cost tooltip, stop ── */
  .pluswrap{position:relative;flex-shrink:0}
  .attach-menu{position:absolute;bottom:42px;left:0;z-index:30;background:#12161c;border:1px solid var(--border2);border-radius:11px;padding:5px;min-width:200px;box-shadow:0 16px 40px -12px #000;display:none}
  .attach-menu.on{display:block}
  .attach-menu button{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;color:var(--muted);font-size:13px;padding:8px 9px;border-radius:8px;cursor:pointer;text-align:left}
  .attach-menu button:hover{background:var(--hover);color:var(--text)}
  .attach-menu .sub{font-size:11px;color:var(--hint)}
  .attach-menu i{font-size:16px;color:var(--accent-soft)}
  .modelwrap{position:relative;display:inline-flex}
  .model-menu{left:0;bottom:34px;min-width:252px}
  .model-menu .mck{margin-left:auto;font-size:14px;color:var(--accent-soft);visibility:hidden}
  .model-menu button.sel .mck{visibility:visible}
  .model-menu .msep{height:1px;background:var(--border);margin:5px 4px}
  .achips{display:flex;gap:7px;flex-wrap:wrap}
  .achip{display:inline-flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:4px 6px 4px 8px;font-size:12px;color:var(--muted)}
  .achip img{width:22px;height:22px;border-radius:4px;object-fit:cover;display:block}
  .achip .x{cursor:pointer;color:var(--hint);font-size:14px;display:inline-flex}
  .achip .x:hover{color:var(--danger)}
  .send.stop{background:var(--danger)}
  .send.stop:hover{background:#ec6a6a}
  .costtip{position:absolute;bottom:34px;right:0;background:#0c0e12;border:1px solid var(--border2);border-radius:8px;padding:6px 10px;font-size:11.5px;color:var(--text);white-space:nowrap;font-variant-numeric:tabular-nums;opacity:0;pointer-events:none;transition:opacity .13s;box-shadow:0 8px 22px -10px #000}
  .cmon:hover .costtip{opacity:1}

  /* ── 亮色主题:令牌整套换血;规则排在最后保证覆盖 ── */
  :root[data-theme="light"]{
    --bg:#f4f6f9; --surface:#ffffff; --surface2:#eaeef4; --hover:#64748b1f; --border:#dfe5ed; --border2:#c9d2de;
    --text:#171c23; --muted:#5a6574; --hint:#8a94a2; --accent:#3f7bf0; --accent-soft:#2b5fd0; --accent-dim:#e6eefc;
    --ok:#1d9e66; --warn:#a97a10; --danger:#c94a4a;
    --pro:#7a5cd0; --pro-dim:#efeafb;
  }
  /* 亮色下少数写死深色的部件(暗色规则一字不动) */
  :root[data-theme="light"] .av{background:#eaeef4}
  :root[data-theme="light"] .answer .tc{background:#e6eefc}
  :root[data-theme="light"] .answer .tc.seek:hover{background:#d5e3fb}
  :root[data-theme="light"] .chartpanel,:root[data-theme="light"] .vcard,:root[data-theme="light"] .tbl{background:#fff;box-shadow:0 1px 2px rgba(23,28,35,.05)}
  :root[data-theme="light"] .tbl th{background:#f0f3f7}
  :root[data-theme="light"] .rowmenu,:root[data-theme="light"] .attach-menu{background:#fff;box-shadow:0 12px 32px -14px rgba(23,28,35,.3)}
  :root[data-theme="light"] .costtip{background:#fff;box-shadow:0 8px 22px -10px rgba(23,28,35,.35)}
  :root[data-theme="light"] .confchip.high{color:#127a4e;background:#dcf3e7}
  :root[data-theme="light"] .confchip.med{color:#2b5fd0;background:#e6eefc}
  :root[data-theme="light"] .confchip.low{color:#5a6574;background:#e8ecf1}
  :root[data-theme="light"] .scrim{background:rgba(23,28,35,.35)}
  /* 写死浅色"文字"的部件(暗底白字 → 亮底深字) */
  :root[data-theme="light"] .user .bubble{color:#1c3d7a}
  :root[data-theme="light"] .answer strong{color:#0f1319}
  :root[data-theme="light"] .answer h1,:root[data-theme="light"] .answer h2,:root[data-theme="light"] .answer h3{color:#0f1319}
  :root[data-theme="light"] pre{color:#3b4450}
  :root[data-theme="light"] .badge.refused{background:#fbe4e4;color:#a33a3a}
  /* 账户区的 ☀/☾ 二态开关 */
  .mode{display:flex;border:1px solid var(--border2);border-radius:999px;padding:2px;gap:2px;flex-shrink:0}
  .mode button{border:0;background:none;color:var(--hint);width:24px;height:20px;border-radius:999px;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;font-size:12px;line-height:1}
  .mode button.on{background:var(--accent-dim);color:var(--accent-soft)}
  .mode button:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
  .shell.collapsed .acct .mode{display:none}
</style></head>

<script>
const $ = s => document.querySelector(s);
const thread = $('#thread');
const EXAMPLES = [
  "Find every video that contains skiing or snowboarding.",
  "What activities appear most across all videos?",
  "How many videos are in the database?",
];
// ── 本地会话历史(ChatGPT 式;存浏览器,后端按 session_id 续聊)──
const LS_CHATS='vs_chats_v1';
let chats = loadChats();   // [{id,title,updatedAt,messages:[{role,text?,data?,ms?}]}](newest-first)
let activeId = null;       // 当前打开的会话 id;null = 尚未落地的新对话(draft)
let activeDraft = 0;       // draft 身份序号(activeId 为 null 时区分"哪一个新对话")
let draftSeq = 0;          // draft 计数器
let sessionId = null;      // 发给后端的 session_id(= activeId)
let sending = false;       // in-flight 守卫:同一时刻只允许一个发送在途

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function el(html){const t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstElementChild;}
function scroll(){thread.scrollTop=thread.scrollHeight;}
function updateSess(){$('#sess').textContent = sessionId ? '· '+sessionId.slice(0,8) : '· New session';}

function showEmpty(){
  thread.innerHTML='';
  const e=el('<div class="empty"></div>');
  const hero=el('<div class="ehero"><div class="eic"><i class="ti ti-message-chatbot" aria-hidden="true"></i></div><div>Ask anything about your video library</div></div>');
  e.appendChild(hero);
  const exs=el('<div class="exs"></div>');
  EXAMPLES.forEach(x=>{const c=el('<span class="ex"></span>');c.textContent=x;c.onclick=()=>send(x);exs.appendChild(c);});
  e.appendChild(exs);
  thread.appendChild(e);
}

// ── 气泡 ──────────────────────────────────────────────
function addUser(text, imgUrl){
  if($('.empty'))thread.innerHTML='';
  const r=el('<div class="row user"></div>');
  const b=el('<div class="bubble"></div>');
  if(imgUrl){                                  // 粘贴的截图:气泡里先显示缩略图
    const im=el('<img alt="pasted image">'); im.src=imgUrl;
    im.style.cssText='max-width:220px;max-height:180px;border-radius:9px;display:block;margin-bottom:6px';
    b.appendChild(im);
  }
  if(text){ const t=el('<span></span>'); t.textContent=text; b.appendChild(t); }
  r.appendChild(b); thread.appendChild(r); scroll();
}

// ── 粘贴/移除截图 ──────────────────────────────────────
let pendingImage=null;                         // data URL(仅当轮用,不入 localStorage 防撑爆)
function setPendingImage(dataUrl){
  pendingImage=dataUrl;
  const wrap=$('#imgPreview'); wrap.innerHTML='';
  if(!dataUrl){ wrap.style.display='none'; return; }
  wrap.style.display='flex';
  const chip=el('<div class="achip"></div>');            // 统一成可删小卡(缩略图 + ✕)
  const img=el('<img alt="attached image">'); img.src=dataUrl; chip.appendChild(img);
  chip.appendChild(Object.assign(el('<span></span>'),{textContent:'image'}));
  const x=el('<span class="x" role="button" aria-label="Remove image" title="Remove"><i class="ti ti-x" aria-hidden="true"></i></span>');
  x.onclick=()=>setPendingImage(null);
  chip.appendChild(x); wrap.appendChild(chip);
}
function assistantShell(){
  const r=el('<div class="row"><div class="av"><i class="ti ti-sparkles" aria-hidden="true"></i></div></div>');
  const card=el('<div class="card"></div>'); r.appendChild(card);
  thread.appendChild(r); scroll(); return card;
}

// ── 富渲染:总入口 ──────────────────────────────────────
// 设计 frontend-ui-refresh:常态不宣告(去掉 follow-up/new/meta 徽章);
// 仅异常(refused)标徽章;trace/plan 收进卡片底部安静页脚(renderFooter)。
function renderAssistant(card, d, ms){
  card.innerHTML='';
  if(d.status==='refused'){
    card.appendChild(badge('refused','Declined'));
    card.appendChild(textBlock(d.reason||"I can't answer that."));
    return;
  }
  if(d.status==='error'){ card.appendChild(textBlock('Something went wrong: '+(d.error||''))); return; }
  if(d.status==='smalltalk'){ card.appendChild(answerBlock(d.answer||'')); card.appendChild(renderFooter(d,ms)); enhanceTimecodes(card); return; }

  // ok
  if(d.videos && d.videos.length){ card.appendChild(renderVideos(d.videos)); }
  if(d.table && d.table.rows && d.table.rows.length){ card.appendChild(renderTable(d.table)); }
  if(d.stat && d.stat.items && d.stat.items.length){ card.appendChild(renderStatCards(d.stat)); }   // P2:KPI 数字卡(头条指标)
  // 结论先行:答案文字始终渲染;有图则把图作为下方证据附上(别让图吞掉结论)
  if(d.answer!=null && !(typeof d.answer==='string' && !d.answer.trim())){ card.appendChild(renderAnswer(d.answer)); }
  if(d.chart_spec){ card.appendChild(renderChartSpec(d.chart_spec)); }   // P1: 交互式 ECharts(spec 驱动)
  else if(d.plot_url){ card.appendChild(renderChart(d.plot_url)); }      // 兜底:旧静态 svg/png

  card.appendChild(renderFooter(d, ms));   // quiet footer: steps · time (expandable), plan/sql/code
  enhanceTimecodes(card);                  // 时间码 → 可点 chip(有视频则跳转)
}

function badge(cls,txt){const b=el('<span class="badge"></span>');b.classList.add(cls);b.textContent=txt;return b;}
function sub(txt){const s=el('<span class="sub"></span>');s.textContent=txt;return s;}
// C: 把大脑写的 markdown 真正渲染出来(结论先行/加粗数字/编号列表更清晰);marked+DOMPurify 都在 → 安全 HTML,
// 否则降级为纯文本(绝不因 CDN 失败而空白)。内容是后端模型输出(id 已在服务端清洗),DOMPurify 再兜一层 XSS。
function mdHtml(txt){
  try{
    if(window.marked && window.DOMPurify){
      const raw=window.marked.parse(String(txt||''), {breaks:true, gfm:true});
      return window.DOMPurify.sanitize(raw, {USE_PROFILES:{html:true}});
    }
  }catch(e){}
  return null;
}
function textBlock(txt){
  const p=el('<div class="answer"></div>');
  const h=mdHtml(txt); if(h!=null) p.innerHTML=h; else p.textContent=txt;
  return p;
}
function answerBlock(txt){ return textBlock(txt); }
// 收口呈现:把答案里的 mm:ss 时间码渲染成 chip;卡片里有视频时点击跳转到该时刻(纯前端增强)
function enhanceTimecodes(card){
  const ans=card.querySelector('.answer'); if(!ans) return;
  const vid=card.querySelector('video');                    // 有播放器就让 chip 可点跳转
  const RE=/\b(\d{1,2}):([0-5]\d)\b/;
  const nodes=[]; const w=document.createTreeWalker(ans, NodeFilter.SHOW_TEXT, null);
  for(let n=w.nextNode(); n; n=w.nextNode()){
    const p=n.parentNode;
    if(p && p.closest && !p.closest('code,pre,a,.tc') && RE.test(n.nodeValue)) nodes.push(n);
  }
  nodes.forEach(node=>{
    const s=node.nodeValue, frag=document.createDocumentFragment(), g=/\b(\d{1,2}):([0-5]\d)\b/g;
    let m, last=0;
    while((m=g.exec(s))){
      if(m.index>last) frag.appendChild(document.createTextNode(s.slice(last,m.index)));
      const chip=el('<span class="tc"></span>'); chip.textContent=m[0];
      if(vid){ const secs=(+m[1])*60+(+m[2]); chip.classList.add('seek'); chip.title='Jump to '+m[0];
        chip.onclick=()=>{ try{ vid.currentTime=secs; vid.play(); vid.scrollIntoView({block:'nearest'}); }catch(e){} }; }
      frag.appendChild(chip); last=m.index+m[0].length;
    }
    if(last<s.length) frag.appendChild(document.createTextNode(s.slice(last)));
    node.parentNode.replaceChild(frag, node);
  });
}

// ── 答案分形:表格 / 统计卡 / 标量 / 文本 ──────────────
function renderAnswer(ans){
  if(ans==null) return textBlock('(empty)');
  if(typeof ans==='string') return textBlock(ans);
  if(Array.isArray(ans)){
    if(ans.length===0) return textBlock('No matching results.');
    if(typeof ans[0]==='object') return renderArrayTable(ans);
    return renderArrayTable(ans.map(v=>({value:v})));
  }
  if(typeof ans==='object') return renderStats(ans);
  return metric(ans);
}
function metric(v){const w=el('<div class="stats"></div>');w.appendChild(stat('Result',v));return w;}
function stat(k,v){const s=el('<div class="stat"></div>');s.appendChild(Object.assign(el('<div class="k"></div>'),{textContent:k}));
  const vv=el('<div class="v"></div>');vv.textContent=fmt(v);s.appendChild(vv);return s;}
function renderStats(obj){
  const w=el('<div class="stats"></div>');
  Object.entries(obj).forEach(([k,v])=>{
    if(v!=null && typeof v==='object'){ // 嵌套(如回归 params)→ 拍平成几条
      Object.entries(v).forEach(([k2,v2])=>w.appendChild(stat(k+'.'+k2,v2)));
    } else w.appendChild(stat(k,v));
  });
  return w;
}
function fmt(v){ if(typeof v==='number'){ return Number.isInteger(v)?v:(+v.toFixed(4)+'').replace(/\.?0+$/,''); } return String(v); }
// P2: show_stat 侧信道 → KPI 数字卡(复用 .stats/.stat/.k/.v,零新样式)
function renderStatCards(st){
  const w=el('<div class="stats"></div>');
  (st.items||[]).forEach(it=>{
    const s=el('<div class="stat"></div>');
    s.appendChild(Object.assign(el('<div class="k"></div>'),{textContent:String(it.label)}));
    const v=el('<div class="v"></div>'); v.textContent=fmt(it.value)+(it.unit?(' '+it.unit):''); s.appendChild(v);
    w.appendChild(s);
  });
  return w;
}
// P3a: 按 video_id 定位到本条回答卡里的播放器并跳转(图表点击 / 跨卡导航复用;唯一的 seek-by-id 入口)
function seekVideoById(root, id, ts){
  const vid=root && root.querySelector('video[data-video-id="'+(window.CSS&&CSS.escape?CSS.escape(String(id)):String(id))+'"]');
  if(!vid) return false;
  const go=()=>{ try{ vid.currentTime=ts||0; vid.play(); vid.scrollIntoView({block:'nearest',behavior:'smooth'}); }catch(e){} };
  if(vid.readyState>=1) go(); else vid.addEventListener('loadedmetadata', go, {once:true});
  return true;
}

// ── 表格:排序 + 置信度条 + CSV ─────────────────────────
function isConfCol(rows,k){
  if(!/conf|score|prob|r2|r_squared/i.test(k)) return false;
  return rows.every(r=>{const x=r[k];return x==null||(typeof x==='number'&&x>=0&&x<=1.0001);});
}
function renderArrayTable(rows){
  const wrap=el('<div class="tbl"></div>');
  const keys=[...new Set(rows.flatMap(r=>Object.keys(r)))];
  const confCols=new Set(keys.filter(k=>isConfCol(rows,k)));
  let sortK=null, sortDir=1, data=rows.slice();
  const scrl=el('<div class="tscroll"></div>');
  const tbl=el('<table></table>');
  function draw(){
    if(sortK!=null) data.sort((a,b)=>{const x=a[sortK],y=b[sortK];return (x>y?1:x<y?-1:0)*sortDir;});
    tbl.innerHTML='';
    const thead=el('<thead><tr></tr></thead>'), tr=thead.querySelector('tr');
    keys.forEach(k=>{const th=el('<th></th>');th.textContent=k+(sortK===k?(sortDir>0?' ▲':' ▼'):'');
      th.onclick=()=>{ if(sortK===k)sortDir*=-1; else {sortK=k;sortDir=1;} draw(); };
      tr.appendChild(th);});
    tbl.appendChild(thead);
    const tb=el('<tbody></tbody>');
    data.slice(0,200).forEach(r=>{
      const row=el('<tr></tr>');
      keys.forEach(k=>{const td=el('<td></td>'); const v=r[k];
        if(confCols.has(k)&&typeof v==='number'){
          const c=el('<div class="barcell"></div>'); const bar=el('<div class="bar"><i></i></div>');
          bar.querySelector('i').style.width=Math.round(v*100)+'%'; c.appendChild(bar);
          const n=el('<span></span>'); n.textContent=(+v.toFixed(2)); n.style.color='var(--muted)';
          c.appendChild(n); td.appendChild(c);
        } else td.textContent = v==null?'':fmt(v);
        row.appendChild(td);});
      tb.appendChild(row);
    });
    tbl.appendChild(tb);
  }
  draw();
  const bar=el('<div class="tbar"></div>');
  const n=el('<span></span>'); n.textContent=rows.length+' rows'+(rows.length>200?' · showing 200':'');
  bar.appendChild(n);

  wrap.appendChild(bar);

  return wrap;
}
function downloadCSV(rows){
  const keys=[...new Set(rows.flatMap(r=>Object.keys(r)))];
  const e=v=>{v=v==null?'':String(v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  const csv=[keys.join(','),...rows.map(r=>keys.map(k=>e(r[k])).join(','))].join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='videosense_result.csv'; a.click();
}

// VS 分类色两主题通用(固定顺序,不循环);文字/网格 chrome 色按主题切,见 chartChrome()
const CHART_PALETTE=['#6ea2ff','#43c88a','#e0a23b','#b79df2','#e05a5a','#3f7bf0'];
const LIVE_CHARTS=[];   // {chart,spec,mount} —— 主题切换时批量重刷 chrome 色
function chartChrome(){

function buildChartOption(spec){
  const type=(spec.chart_type||'bar');

  const isScatter = type==='scatter';

      itemStyle:{color:c,opacity:.85}, data:(s.data||[]).map((v,j)=>[x[j],v])};
    if(type==='line') return {name:s.name,type:'line',smooth:true,symbol:'circle',symbolSize:6,
      showSymbol:(s.data||[]).length<=40, lineStyle:{width:2,color:c}, itemStyle:{color:c},

        [{offset:0,color:'rgba(110,162,255,.22)'},{offset:1,color:'rgba(110,162,255,0)'}])}:undefined,

      textStyle:{color:C.title,fontSize:13.5,fontWeight:600,fontFamily:'system-ui,sans-serif'}} : undefined,
    grid:{left:8,right:14,top: spec.title?38:14,bottom:6,containLabel:true},
    tooltip:{trigger:isScatter?'item':'axis',
      backgroundColor:C.tipBg,borderColor:C.tipBd,borderWidth:1,
      textStyle:{color:C.tipTx,fontSize:12},
      axisPointer:{type:type==='bar'?'shadow':'line',lineStyle:{color:C.axis},shadowStyle:{color:C.ptr}}},
    legend: series0.length>1 ? {top:2,right:6,textStyle:{color:C.tx,fontSize:11},itemWidth:12,itemHeight:8} : undefined,
    xAxis:{type:isScatter?'value':'category', data:isScatter?undefined:x, name:spec.x_name||'', nameTextStyle:{color:C.label},
      axisLine:{lineStyle:{color:C.axis}}, axisTick:{show:false}, axisLabel:{color:C.label,fontSize:11}, splitLine:{show:false}},
    yAxis:{type:'value', name:spec.unit||'', nameTextStyle:{color:C.label,align:'left'},
      axisLine:{show:false}, axisTick:{show:false}, axisLabel:{color:C.label,fontSize:11},
      splitLine:{lineStyle:{color:C.split}}},
    toolbox:{right:6,top:6,feature:{saveAsImage:{title:'PNG',backgroundColor:C.saveBg,
      iconStyle:{borderColor:C.label}}},emphasis:{iconStyle:{borderColor:'#6ea2ff'}}},

}
function renderChartSpec(spec){

    // P3a:点柱子/点 → 跳到对应视频片段(spec.links[dataIndex] = video_id 或 {video_id,ts});解析限本条回答卡内
    const links=spec.links, hasLinks=Array.isArray(links)&&links.length;
    if(hasLinks){
      chart.getZr().setCursorStyle('pointer');

      const rows=(spec.x||[]).map((xv,i)=>{const o={}; o[cols[0]]=xv; ys.forEach((s,j)=>o[cols[j+1]]=(s.data||[])[i]); return o;});

// ── 视频展示:内嵌 <video> 播放数据库里的视频/片段(show_video 节点产出)──────
// 签名直链 15 分钟就过期:离开后重开历史(或页面开着超时再点播)时旧 URL 已死。
// 渲染时按需向 /v1/resign 换一批新鲜 URL;播放报错再兜底重签一次。(浏览器对同源自动带 Basic 认证。)
async function resignVideos(ids){
  try{
    const r=await fetch('/v1/resign',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({video_ids:ids})});
    if(!r.ok) return {};
    return (await r.json()).signed||{};
  }catch(e){ return {}; }
}
// V1: segment marker bar — highlights [start_ts,end_ts] under the player; click seeks to the moment.
// confidence → segment color(诚实的轻量"热力":有 score 就按置信度上色,不造逐帧假数据)
function scoreColor(s){ return s==null?'#3f7bf0' : (s>=0.75?'#6ea2ff' : s>=0.5?'#3f7bf0' : '#2c4a78'); }
function markerBar(vid, v){
  if(v.start_ts==null) return null;
  const conf=(typeof v.score==='number')?(' · confidence '+v.score.toFixed(2)):'';
  const bar=el('<div style="position:relative;height:6px;margin:0 1px;border-radius:3px;background:#1d2229;cursor:pointer" title="Matched segment — click to jump'+conf+'"></div>');
  const seg=el('<div style="position:absolute;top:0;height:6px;border-radius:3px;min-width:6px"></div>');
  seg.style.background=scoreColor(v.score);
  bar.appendChild(seg);
  const place=()=>{
    const dur=vid.duration||v.duration_sec||0; if(!dur) return;
    const s=Math.max(0,Math.min(v.start_ts,dur)), e=Math.max(s,Math.min(v.end_ts!=null?v.end_ts:s+3,dur));
    seg.style.left=(s/dur*100)+'%'; seg.style.width=Math.max(1,(e-s)/dur*100)+'%';
  };
  vid.addEventListener('loadedmetadata', place, {once:true}); place();
  bar.onclick=()=>{ try{ vid.currentTime=v.start_ts; vid.play(); }catch(e){} };
  return bar;
}
function mountVideo(vid, v){
  let resigned=false;
  if(v.start_ts!=null){ vid.addEventListener('loadedmetadata',()=>{ try{vid.currentTime=v.start_ts;}catch(e){} }, {once:true}); }
  const resign=async()=>{                    // 换一次新鲜 URL(至多一次,防死循环)
    if(resigned || !v.video_id) return; resigned=true;
    const url=(await resignVideos([v.video_id]))[v.video_id];
    if(url) vid.src=safeUrl(url);
  };
  if(v.signed_url) vid.src=safeUrl(v.signed_url);   // 刚回答的当场播(URL 新鲜)
  else resign();                                    // 历史渲染:signed_url 已被剥离 → 直接重签
  vid.addEventListener('error', resign, {once:true});   // 开着太久 URL 过期 → 报错时重签
}
function renderVideos(list){
  const wrap=el('<div class="vgrid"></div>');
  list.forEach((v,i)=>{
    const card=el('<div class="vcard"></div>');

    head.appendChild(Object.assign(el('<span class="vnum"></span>'),{textContent:'#'+(i+1)}));  // 1..N,用户可说「第 N 个」
    head.appendChild(Object.assign(el('<span></span>'),{textContent:(v.title||('Video '+(i+1))),

    if(typeof v.score==='number'){                       // P3c:置信度 chip(有分才显示)
      const band=v.score>=0.75?'high':v.score>=0.5?'med':'low';
      const chip=el('<span class="confchip"></span>'); chip.classList.add(band);
      chip.textContent=band+' · '+v.score.toFixed(2); chip.title='Match confidence';
      head.appendChild(chip);
    }
    card.appendChild(head);
    if(v.playable && v.video_id){
      const vid=el('<video controls preload="metadata" playsinline></video>');
      vid.dataset.videoId=v.video_id;                    // P3a:标记 id,图表点击可定位到这个播放器
      mountVideo(vid, v);

          c.onclick=()=>{ try{ vid.currentTime=m.ts; vid.play(); }catch(e){} };

      }
    } else {
      const note=el('<div class="vna"><i class="ti ti-player-play-off" aria-hidden="true"></i>Preview unavailable</div>');

// ── show_table:原始查询结果直接渲染成表格(不经大脑逐行复述)──────
function renderTable(t){
  const cols=t.columns||[], rows=t.rows||[];
  const wrap=el('<div class="tbl"></div>');

  const cnt=el('<span></span>');

  bar.appendChild(csvBtn);

  const scroll=el('<div class="tscroll"></div>');
  const tbl=el('<table></table>');
  const thead=el('<thead></thead>'); const htr=el('<tr></tr>');
  htr.appendChild(Object.assign(el('<th class="cnum"></th>'),{textContent:'#'}));
  cols.forEach(c=>{ const th=el('<th></th>'); th.textContent=c; htr.appendChild(th); });

    tr.appendChild(Object.assign(el('<td class="cnum"></td>'),{textContent:(i+1)}));   // 1..N,用户可说「第 N 个」
    cols.forEach(c=>{ const td=el('<td></td>'); const v=r[c]; td.textContent=(v==null?'':String(v)); tr.appendChild(td); });
    tb.appendChild(tr); });
  tbl.appendChild(tb); scroll.appendChild(tbl); wrap.appendChild(scroll);
  return wrap;
}

function downloadCsv(cols, rows){
  const esc=v=>{ const s=(v==null?'':String(v)); return /[",\n]/.test(s)?('"'+s.replace(/"/g,'""')+'"'):s; };
  const lines=[cols.map(esc).join(',')];
  rows.forEach(r=>lines.push(cols.map(c=>esc(r[c])).join(',')));
  const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='table.csv';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}

// ── 安静页脚:一行 steps · time 摘要(点击展开完整 timeline);SQL/代码另收进 disclosure ──
// 设计 frontend-ui-refresh:元信息常态不宣告,细节按需展开。
function stepSummary(d, ms){
  const lo=d.loop||{}; const tc=lo.tool_calls||{};
  const parts=[];
  const nSteps = lo.steps!=null ? lo.steps : (d.trace?d.trace.length:0);
  if(nSteps) parts.push('Steps '+nSteps);
  const NAME={sql_query:'sql',analyze_video:'watch',show_video:'show',show_table:'table',
              web_search:'web',update_memory:'memory',python:'python',plot:'plot'};
  Object.entries(tc).forEach(([k,v])=>{ parts.push((NAME[k]||k)+(v>1?(' ×'+v):'')); });
  if(ms!=null) parts.push((ms/1000).toFixed(1)+'s');
  return parts.join(' · ');
}
function renderFooter(d, ms){
  const foot=el('<div class="foot"></div>');
  const hasTrace = d.trace && d.trace.length;
  const summaryTxt = stepSummary(d, ms) || (hasTrace?('Steps '+d.trace.length):'');
  if(hasTrace){
    const det=el('<details class="foot-d"></details>');
    const sm=el('<summary class="fsum"></summary>');
    sm.innerHTML='<i class="ti ti-chevron-right chev" aria-hidden="true"></i>';
    sm.appendChild(document.createTextNode(summaryTxt));
    det.appendChild(sm);
    det.appendChild(traceBlock(d.trace));
    foot.appendChild(det);
  } else if(summaryTxt){
    foot.appendChild(Object.assign(el('<span class="fsum"></span>'),{textContent:summaryTxt}));
  }
  foot.appendChild(el('<span style="flex:1"></span>'));
  // SQL / 生成代码:收进右侧 disclosure(默认收起)
  const sql = d.dag&&d.dag.nodes ? d.dag.nodes.map(n=>n.inputs&&n.inputs.sql).filter(Boolean).join('\n\n') : '';
  if(sql){ const b=footBtn('ti-database','View SQL'); b.onclick=()=>toggleDisc(foot,'sql',sql); foot.appendChild(b); }
  if(d.generated_code&&Object.keys(d.generated_code).length){
    const code=Object.entries(d.generated_code).map(([k,v])=>'# '+k+'\n'+v).join('\n\n');
    const b=footBtn('ti-code','View code'); b.onclick=()=>toggleDisc(foot,'code',code); foot.appendChild(b);
  }
  const copyB=footBtn('ti-copy',null); copyB.title='Copy answer';
  copyB.onclick=()=>{ try{navigator.clipboard.writeText(typeof d.answer==='string'?d.answer:JSON.stringify(d.answer,null,2));}catch(e){} };
  foot.appendChild(copyB);
  const wrap=el('<div></div>'); wrap.appendChild(foot); return wrap;
}
function footBtn(icon,txt){
  const b=el('<button class="fact"></button>'); b.innerHTML='<i class="ti '+icon+'" aria-hidden="true"></i>';
  if(txt){ b.style.cssText='font-size:11.5px;display:inline-flex;align-items:center;gap:4px;color:var(--hint)'; b.appendChild(document.createTextNode(txt)); }
  return b;
}
function toggleDisc(foot, kind, code){
  const wrap=foot.parentElement;
  const ex=wrap.querySelector('pre[data-k="'+kind+'"]');
  if(ex){ ex.remove(); return; }
  const pre=el('<pre></pre>'); pre.setAttribute('data-k',kind); pre.textContent=code; wrap.appendChild(pre);
}
function traceBlock(trace){
  const box=el('<div class="trace"></div>');
  const color={ok:'var(--ok)',error:'var(--danger)',retry:'var(--warn)',running:'var(--hint)'};
  trace.forEach(st=>{
    const row=el('<div class="tstep"></div>');
    const dot=el('<span class="dot"></span>'); dot.style.background=color[st.status]||'var(--hint)'; row.appendChild(dot);
    const nm=el('<span class="tname"></span>'); nm.textContent=st.name+(st.error?(' — '+st.error):''); row.appendChild(nm);
    const ms=el('<span class="tms"></span>'); ms.textContent=(st.elapsed_ms!=null?st.elapsed_ms+'ms':''); row.appendChild(ms);
    box.appendChild(row);
  });
  return box;
}

// ── 本地会话历史存取 ───────────────────────────────────
function loadChats(){ try{ return JSON.parse(localStorage.getItem(LS_CHATS))||[]; }catch(e){ return []; } }
function saveChats(){
  while(true){
    try{ localStorage.setItem(LS_CHATS, JSON.stringify(chats)); return; }
    catch(e){                                 // 配额超限:逐步裁剪后重试,绝不静默丢当前会话
      let idx=-1;                             // 先删最旧的【非当前】会话
      for(let i=chats.length-1;i>=0;i--){ if(chats[i].id!==activeId){ idx=i; break; } }
      if(idx>=0){ chats.splice(idx,1); continue; }
      const a=chats[0];                       // 只剩当前会话仍超限 → 砍它最旧的两条消息
      if(a && a.messages.length>2){ a.messages.splice(0,2); continue; }
      return;                                 // 实在存不下 → 放弃本轮持久化(不抛错)
    }
  }
}
function activeChat(){ return chats.find(c=>c.id===activeId)||null; }
function titleOf(t){ t=String(t||'').trim().replace(/\s+/g,' '); return t ? (t.length>42?t.slice(0,42)+'…':t) : 'New chat'; }

// ── 侧栏渲染:置顶 + 按日期分组 + 搜索 + 行菜单 ──────────────
let sbFilter='';                                  // 搜索词(标题 + 本地消息文本)
function startOfDay(t){ const d=new Date(t); d.setHours(0,0,0,0); return d.getTime(); }
function bucketOf(ts){
  const today=startOfDay(Date.now()), day=86400000, d=startOfDay(ts||0);
  if(d>=today) return {k:'today', label:'Today', ord:1};
  if(d>=today-day) return {k:'yst', label:'Yesterday', ord:2};
  if(d>=today-7*day) return {k:'p7', label:'Previous 7 days', ord:3};
  if(d>=today-30*day) return {k:'p30', label:'Previous 30 days', ord:4};
  const dt=new Date(ts); return {k:'m'+dt.getFullYear()+'-'+dt.getMonth(),
    label:dt.toLocaleDateString(undefined,{month:'long',year:'numeric'}), ord:5+ (9999-(dt.getFullYear()*12+dt.getMonth()))/100000};
}
function chatMatches(c, q){
  if(!q) return true; q=q.toLowerCase();
  if((c.title||'').toLowerCase().indexOf(q)>=0) return true;
  return (c.messages||[]).some(m=>m.role==='user' && (m.text||'').toLowerCase().indexOf(q)>=0);   // 本地存了文本 → 能搜正文
}
function convRow(c){
  const row=el('<div class="conv"></div>');
  if(c.id===activeId) row.classList.add('active');
  if(c.pinned) row.classList.add('pinned');
  row.appendChild(el('<i class="ti ti-message ci" aria-hidden="true"></i>'));           // 收窄态图标
  if(c.pinned) row.appendChild(el('<i class="ti ti-pin pin-i" aria-hidden="true"></i>'));
  const t=el('<span class="title"></span>'); t.textContent=c.title; row.appendChild(t);
  const more=el('<button class="more" aria-label="Chat actions"><i class="ti ti-dots" aria-hidden="true"></i></button>');
  row.appendChild(more);
  row.onclick=(e)=>{ if(e.target.closest('.more')) return; openChat(c.id); };
  more.onclick=(e)=>{ e.stopPropagation(); openRowMenu(more, c); };
  return row;
}
function renderSidebar(){
  const list=$('#convlist'); list.innerHTML=''; closeRowMenu();
  const shown=chats.filter(c=>chatMatches(c, sbFilter));
  if(!chats.length){ list.appendChild(el('<div class="sb-empty">No conversations yet.<br>Ask a question to start one.</div>')); return; }
  if(!shown.length){ list.appendChild(el('<div class="sb-empty">No chats match your search.</div>')); return; }
  const pinned=shown.filter(c=>c.pinned).sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
  if(pinned.length){
    list.appendChild(Object.assign(el('<div class="sb-h pin"></div>'),{textContent:'Pinned'}));
    pinned.forEach(c=>list.appendChild(convRow(c)));
  }
  const groups={};                                 // 未置顶 → 按日期桶
  shown.filter(c=>!c.pinned).forEach(c=>{ const b=bucketOf(c.updatedAt); (groups[b.k]||(groups[b.k]={b, rows:[]})).rows.push(c); });
  Object.values(groups).sort((a,b)=>a.b.ord-b.b.ord).forEach(g=>{
    list.appendChild(Object.assign(el('<div class="sb-h"></div>'),{textContent:g.b.label}));
    g.rows.sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0)).forEach(c=>list.appendChild(convRow(c)));
  });
}

function startRename(c){

// ── 新对话 / 打开 / 删除 ───────────────────────────────
function newChat(){
  activeId=null; activeDraft=++draftSeq; sessionId=null; updateSess();
  convTok=0; convCost=0; renderMonitor();        // 新对话:累计归零
  renderSidebar(); showEmpty(); $('#q').focus();
  if(window.innerWidth<=720) $('#shell').classList.add('nosb');   // 移动端开新对话即收起侧栏
}
function openChat(id){
  const c=chats.find(x=>x.id===id); if(!c) return;
  activeId=id; activeDraft=0; sessionId=id; updateSess();
  if(c.model && Object.prototype.hasOwnProperty.call(MODELS,c.model)){ brainModel=c.model; renderModelUI(); }   // 恢复该会话的模型选择
  thread.innerHTML='';
  if(!c.messages.length){ showEmpty(); }
  else c.messages.forEach(m=>{
    if(m.role==='user') addUser(m.text);
    else { const card=assistantShell(); renderAssistant(card, m.data, m.ms); }
  });
  monitorFromChat(c);                            // 恢复该会话的累计 token/成本
  renderSidebar(); scroll();
  if(window.innerWidth<=720) $('#shell').classList.add('nosb');   // 移动端选完自动收起

function deleteChat(id, ev){

  chats=chats.filter(c=>c.id!==id); saveChats();
  if(activeId===id) newChat(); else renderSidebar();
}

// ── 发送 ──────────────────────────────────────────────
// SSE 流式消费(M6b):POST → 读 ReadableStream → 逐条 data: 事件;step/answer 给进度,result 给最终。
// dag 路径不发 step 事件,只收 result —— 自动降级为"转圈到出结果"。
async function streamQuery(q, sentSid, onEvent, image, signal){
  const body={query:q, session_id:sentSid, pro_video:proOn, model:brainModel};
  if(image) body.image=image;
  const r=await fetch('/v1/video_vibe_query/stream',{method:'POST',
    headers:{'Content-Type':'application/json'}, body:JSON.stringify(body), signal});
  if(!r.ok || !r.body){                       // 把服务端说明带给用户(如 422 的"本账号可选:…")
    let t=''; try{ t=await r.text(); }catch(e){}
    throw new Error('HTTP '+r.status+(t?' — '+t.slice(0,160):''));
  }
  const reader=r.body.getReader(), dec=new TextDecoder();
  let buf='', result=null;
  for(;;){
    const {value,done}=await reader.read(); if(done) break;
    buf+=dec.decode(value,{stream:true});
    let i;
    while((i=buf.indexOf('\n\n'))>=0){
      const block=buf.slice(0,i); buf=buf.slice(i+2);
      const line=block.split('\n').find(l=>l.startsWith('data:')); if(!line) continue;
      let ev; try{ ev=JSON.parse(line.slice(5).trim()); }catch(e){ continue; }
      if(ev.type==='result') result=ev.result; else onEvent(ev);
    }
  }
  return result;
}
async function send(text){
  let q = text!=null ? text : $('#q').value.trim();
  const image = pendingImage;                  // 抓住本轮图(下面即清空预览)
  if((!q && !image) || sending) return;        // in-flight 守卫;有图可只发图
  sending=true;
  const shownQ = q || '';                       // 气泡显示用户真正打的字(可空)
  if(image && !q) q = 'What is in this image, and is it related to any of my videos?';  // 只发图 → 给模型一个默认意图
  $('#q').value=''; autosize(); setPendingImage(null); addUser(shownQ, image);
  abortCtrl=new AbortController(); setSendStopUI(true);   // 送出即进入可 Stop 态(箭头变红,点击取消)
  const card=assistantShell();
  const think=el('<div class="think"><span class="breathe"></span><span class="tmsg">Thinking…</span></div>');
  const steps=el('<div class="trace" style="margin-top:6px"></div>');
  card.appendChild(think); card.appendChild(steps);
  const onEvent=(ev)=>{
    if(ev.type==='step'){
      think.querySelector('.tmsg').textContent='Working · step '+(ev.step+1);
      (ev.tools||[]).forEach(t=>{
        const row=el('<div class="tstep"></div>');
        const dot=el('<span class="dot"></span>'); dot.style.background=t.ok?'var(--ok)':'var(--danger)'; row.appendChild(dot);
        const nm=el('<span class="tname"></span>'); nm.textContent=t.tool; row.appendChild(nm);
        steps.appendChild(row);
      });
      scroll();
    } else if(ev.type==='answer'){ think.querySelector('.tmsg').textContent='Writing answer…'; }
  };
  const t0=performance.now();
  const originId=activeId, originDraft=activeDraft, sentSid=sessionId;   // 快照:发起时的归属
  try{
    const d=await streamQuery(q, sentSid, onEvent, image, abortCtrl.signal) || {status:'error', error:'no result'};
    const ms=Math.round(performance.now()-t0);
    updateContext(d);
    // 路由到【发起时】的会话,而非 await 后的当前会话 —— 中途切换/删除都不会错配
    let c = originId ? chats.find(x=>x.id===originId) : chats.find(x=>x.id===d.session_id);
    if(!originId && !c){                        // draft 首次落地 → 新建(用后端 session_id 当 id)
      c={ id: d.session_id || ('local-'+Date.now()), title: titleOf(q), updatedAt: Date.now(), messages: [] };
    }
    if(c){
      if(d.session_id && c.id!==d.session_id) c.id=d.session_id;   // 对齐后端 session_id(过期/重建)
      c.messages.push({role:'user', text:q});
      // 存历史前剥掉短命的 signed_url(15 分钟即失效;重开时按 video_id 重签,见 mountVideo)
      if(d.videos) d.videos.forEach(v=>{ delete v.signed_url; });
      c.messages.push({role:'assistant', data:d, ms});
      c.model=brainModel;                       // 阶段A:会话记住这轮用的大脑,重开时恢复
      c.updatedAt=Date.now();
      chats=[c, ...chats.filter(x=>x!==c)];     // 最近活跃置顶
      saveChats();
      // 仅当用户仍停留在发起时的会话,才动全局 + 高亮(否则结果只入库,重开即见)
      const stillHere = originId ? (activeId===originId) : (activeId===null && activeDraft===originDraft);
      if(stillHere){ activeId=c.id; activeDraft=0; sessionId=c.id; updateSess(); }
      renderSidebar();
    }
    // c 为空且非 draft → 目标会话在 await 期间被删了 → 丢弃结果,不复活
    renderAssistant(card, d, ms);               // card 若已随切换分离则不可见,符合预期(已入库)
  }catch(e){
    card.innerHTML='';
    if(e && e.name==='AbortError'){ card.appendChild(sub('Stopped.')); }   // 用户按 Stop:安静收场,不报错
    else card.appendChild(textBlock('Request failed: '+e));
  }
  finally{ sending=false; abortCtrl=null; setSendStopUI(false); $('#q').focus(); scroll(); }
}
// 发送键在 send ⇄ stop 之间切换:保留箭头图标(仅变红),Stop 时点击=取消 agent 循环(省 token)

$('#toggle').onclick=()=>$('#shell').classList.toggle('nosb');

const SB_COLLAPSED='vs_sb_collapsed';

$('#acctBtn').onclick=()=>{ if(window.innerWidth<=720) $('#shell').classList.add('nosb'); newChat(); };  // 占位:自建单用户,先当"回到新对话"
// ── 主题切换:头部内联脚本已定初始态,这里只管按钮态/持久化/图表重刷 ──
const LS_THEME='vs_theme';

  if(f.size>8*1024*1024){ alert('Image too large (max 8MB).'); return; }

// Ctrl+V 粘贴截图 → 缩略图预览(不把二进制当文本粘进输入框)
$('#q').addEventListener('paste',e=>{
  const items=(e.clipboardData&&e.clipboardData.items)||[];

      const f=it.getAsFile(); if(!f) return;

      e.preventDefault(); return;
    }
  }
});

// ── 档位开关(Flash / Pro)+ 本会话累计监控(成本 $ + 累计 token 占窗口环)──
// ── 阶段A:CC 式大脑模型切换 + Pro 视频眼开关(同一菜单;换脑不换眼)──
const MODELS={'gemini-3.5-flash':'3.5 Flash','gemini-2.5-flash':'2.5 Flash','gemini-2.5-pro':'2.5 Pro'};
const LS_MODEL='vs_model';
const hasModel=(m)=>Object.prototype.hasOwnProperty.call(MODELS,m);
let brainModel=(()=>{ try{ const m=localStorage.getItem(LS_MODEL); if(m&&hasModel(m)) return m; }catch(e){} return 'gemini-3.5-flash'; })();
let proOn=false;
function renderModelUI(){
  $('#modelLbl').textContent=MODELS[brainModel]||brainModel;
  document.querySelectorAll('#modelMenu .mopt').forEach(b=>b.classList.toggle('sel', b.dataset.m===brainModel));
  $('#proCk').style.visibility=proOn?'visible':'hidden';
  $('#proMark').style.display=proOn?'':'none';
  $('#modelPill').classList.toggle('on', proOn);
}
$('#modelPill').onclick=(e)=>{ e.stopPropagation(); const on=$('#modelMenu').classList.toggle('on');
  $('#modelPill').setAttribute('aria-expanded', on?'true':'false'); $('#attachMenu').classList.remove('on'); };
document.querySelectorAll('#modelMenu .mopt').forEach(b=>{ b.onclick=(e)=>{ e.stopPropagation();
  brainModel=b.dataset.m; try{ localStorage.setItem(LS_MODEL,brainModel); }catch(e2){}
  const c=chats.find(x=>x.id===activeId); if(c){ c.model=brainModel; saveChats(); }   // 选择记在会话上
  renderModelUI(); $('#modelMenu').classList.remove('on'); $('#modelPill').setAttribute('aria-expanded','false'); }; });
$('#proVideoOpt').onclick=(e)=>{ e.stopPropagation(); proOn=!proOn; renderModelUI(); };
document.addEventListener('click',e=>{ if(!e.target.closest('.modelwrap')){ $('#modelMenu').classList.remove('on'); $('#modelPill').setAttribute('aria-expanded','false'); } });
renderModelUI();
// 按账号过滤菜单(guest 看不到锁着的档,而不是点了才 422);fail-open:拿不到就保留静态菜单
fetch('/v1/models').then(r=>r.ok?r.json():null).then(d=>{
  if(!d||!Array.isArray(d.choices)||!d.choices.length) return;
  document.querySelectorAll('#modelMenu .mopt').forEach(b=>{ if(!d.choices.includes(b.dataset.m)) b.style.display='none'; });
  if(!d.choices.includes(brainModel)){
    brainModel = d.choices.includes(d.default) ? d.default : d.choices[0];
    try{ localStorage.setItem(LS_MODEL,brainModel); }catch(e){}
    renderModelUI();
  }
}).catch(()=>{});

// M5:上传自己的视频 → 拿 PUT 签名 URL 直传 GCS → 把临时 video_id 填进输入框,可直接提问
$('#upFile').onchange=async(e)=>{
  const f=e.target.files[0]; if(!f) return;
  const btn=$('#plusBtn'), old=btn.innerHTML; btn.innerHTML='<i class="ti ti-loader-2" aria-hidden="true"></i>'; btn.disabled=true;
  try{
    const r=await fetch('/v1/upload_url',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({content_type:f.type||'video/mp4'})});
    if(!r.ok){ alert('Upload request failed: '+r.status+' '+(await r.text())); return; }
    const d=await r.json();
    const put=await fetch(d.upload_url,{method:'PUT',body:f,
      headers:{'Content-Type':d.content_type,'x-goog-content-length-range':'0,'+d.max_bytes}}); // 大小上限已签进 URL
    if(!put.ok){ alert('Upload failed: '+put.status+' (may exceed the size limit)'); return; }
    fetch('/v1/enrich',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({video_id:d.video_id})}).catch(()=>{});  // V1.5: fire-and-forget enrichment (transcript+caption -> semantic index)
    const q=$('#q'); q.value=`I uploaded a video (${d.video_id}), `; q.focus(); // 预填 → 用户接着问
    btn.innerHTML='<i class="ti ti-check" aria-hidden="true"></i>';
  }catch(err){ alert('Upload error: '+err); }
  finally{ btn.disabled=false; e.target.value=''; setTimeout(()=>{btn.innerHTML=old;},2000); }
};
function fmtTok(n){ return n>=1000 ? (n/1000).toFixed(n>=10000?0:1)+'k' : String(Math.round(n||0)); }
let convTok=0, convCost=0;
const CTX_WINDOW=1000000;        // 模型上下文窗口(flash≈1M)—— 累计 token 占比基准
function renderMonitor(){
  const txt=$('#cmtxt');
  if(txt) txt.textContent = convTok>0 ? ('$'+convCost.toFixed(4)+' · '+fmtTok(convTok)+' tok') : '';
  const pct=Math.max(0,Math.min(100, Math.round(convTok/CTX_WINDOW*100)));
  const arc=$('#cmarc'), p=$('#cmpct');
  if(arc){ arc.setAttribute('stroke-dashoffset', (75.4*(1-pct/100)).toFixed(1));
    arc.setAttribute('stroke', pct>=90?'var(--danger)':pct>=70?'var(--warn)':'var(--pro)'); }  // 逼近 1M 窗口才变色
  if(p) p.textContent = pct+'%';
  const tip=$('#costtip');
  if(tip) tip.textContent = convTok>0 ? ('$'+convCost.toFixed(4)+' · '+fmtTok(convTok)+' / ~1M tok · '+pct+'%') : 'No spend yet this session';
}
function updateContext(d){       // 每轮:把本轮 token/成本累加进本会话
  const u=(d&&d.usage)||{};
  convTok += u.tokens_total||0;
  convCost += u.cost_usd||0;
  renderMonitor();
}
function monitorFromChat(c){     // 切换/打开会话:从该会话历史重算累计
  convTok=0; convCost=0;
  if(c&&c.messages) c.messages.forEach(m=>{ const u=m.data&&m.data.usage; if(u){ convTok+=u.tokens_total||0; convCost+=u.cost_usd||0; } });
  renderMonitor();
}

renderSidebar();
if(chats.length) openChat(chats[0].id); else newChat();
if(window.innerWidth<=720) $('#shell').classList.add('nosb');
