<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>VideoSense</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.24.0/tabler-icons.min.css"/>
<style>
  :root{
    --bg:#0a0b0d; --surface:#111418; --surface2:#181b20; --hover:#1e222833; --border:#22262d; --border2:#2c313a;
    --text:#e8ebef; --muted:#98a2ae; --hint:#69727e; --accent:#3f7bf0; --accent-soft:#6ea2ff; --accent-dim:#16233f;
    --ok:#43c88a; --warn:#e0a23b; --danger:#e05a5a; --radius:10px; --card-radius:14px;
    --pro:#b79df2; --pro-dim:#241d33;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font:15px/1.6 system-ui,"Segoe UI",-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
  .shell{display:flex;height:100vh;overflow:hidden}
  .app{flex:1;min-width:0;display:flex;flex-direction:column}
  i.ti{font-size:inherit;line-height:1;vertical-align:-.06em}
  /* ── sidebar ── */
  .sidebar{width:270px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
  .shell.nosb .sidebar{display:none}
  .sidebar .sb-top{padding:12px}
  .newbtn{width:100%;justify-content:center;font-size:13.5px;padding:9px 12px;font-weight:500}
  .sidebar .sb-h{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--hint);padding:12px 14px 5px}
  .convlist{flex:1;overflow-y:auto;padding:2px 8px 12px}
  .conv{position:relative;display:flex;align-items:center;gap:8px;padding:9px 10px 9px 13px;border-radius:9px;cursor:pointer;color:var(--muted);transition:background .13s,color .13s}
  .conv:hover{background:var(--surface2);color:var(--text)}
  .conv.active{background:var(--accent-dim);color:var(--text)}
  .conv.active::before{content:"";position:absolute;left:3px;top:9px;bottom:9px;width:2.5px;border-radius:2px;background:var(--accent-soft)}
  .conv .title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13.5px}
  .conv .del{opacity:0;color:var(--hint);font-size:16px;line-height:1;padding:2px 4px;border-radius:6px;transition:opacity .13s,color .13s}
  .conv:hover .del{opacity:.6}
  .conv .del:hover{color:var(--danger);opacity:1;background:var(--hover)}
  .sb-empty{color:var(--hint);font-size:13px;text-align:center;line-height:1.7;padding:26px 12px}
  .icon-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:5px 8px;border-radius:8px;line-height:1;transition:background .13s,color .13s}
  .icon-btn:hover{color:var(--text);background:var(--surface2)}
  .scrim{display:none}
  @media(max-width:720px){
    .sidebar{position:fixed;z-index:30;top:0;bottom:0;left:0;width:80%;max-width:300px;box-shadow:2px 0 30px rgba(0,0,0,.6)}
    .shell:not(.nosb) .scrim{display:block;position:fixed;inset:0;z-index:25;background:rgba(0,0,0,.5)}
  }
  header{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--border)}
  header .logo{width:29px;height:29px;border-radius:8px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;color:var(--accent-soft);font-size:15px}
  header h1{font-size:15.5px;font-weight:600;margin:0;letter-spacing:-.01em}
  header .sess{font-size:12.5px;color:var(--hint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:40vw}
  header .spacer{flex:1}
  .btn{background:var(--surface2);color:var(--muted);border:1px solid var(--border2);border-radius:9px;
    padding:6px 12px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:color .13s,border-color .13s,background .13s}
  .btn:hover{color:var(--text);border-color:#3a414c;background:var(--hover)}
  .thread{flex:1;overflow-y:auto;padding:20px 18px;display:flex;flex-direction:column;gap:16px;align-items:center}
  .thread>*{width:100%;max-width:820px}
  .row{display:flex;gap:11px;animation:rise .22s ease}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .row.user{justify-content:flex-end}
  .bubble{max-width:80%;padding:10px 14px;border-radius:15px 15px 4px 15px;white-space:pre-wrap;word-break:break-word;font-size:14px}
  .user .bubble{background:var(--accent-dim);color:#d7e4ff}
  .av{width:27px;height:27px;border-radius:8px;background:#151920;display:flex;align-items:center;justify-content:center;color:var(--accent-soft);font-size:14px;flex-shrink:0}
  .card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:13px 16px;max-width:calc(100% - 38px)}
  .answer{font-size:14px;line-height:1.65;white-space:pre-wrap;word-break:break-word}
  .badge{font-size:11.5px;padding:3px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:5px;margin-bottom:8px}
  .badge.refused{background:#3a2526;color:#e7a3a3}
  .sub{font-size:12px;color:var(--hint);font-variant-numeric:tabular-nums}
  .chips{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:10px}
  .chip{font-size:12px;padding:3px 10px;border-radius:999px;background:var(--surface2);color:var(--muted);display:inline-flex;align-items:center;gap:5px;cursor:pointer;transition:color .13s,background .13s}
  .chip:hover{color:var(--text);background:var(--hover)}
  .lnk{font-size:12px;color:var(--accent-soft);cursor:pointer;display:inline-flex;align-items:center;gap:4px;user-select:none}
  .lnk:hover{text-decoration:underline}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
  .stat{background:var(--surface2);border-radius:10px;padding:11px 13px}
  .stat .k{font-size:12px;color:var(--muted)}
  .stat .v{font-size:22px;font-weight:600;margin-top:2px;font-variant-numeric:tabular-nums}
  /* result footer (trace, quiet, on demand) */
  .foot{display:flex;align-items:center;gap:10px;margin-top:12px;padding-top:9px;border-top:1px solid var(--border)}
  .foot .fsum{font-size:11.5px;color:var(--hint);cursor:pointer;display:inline-flex;align-items:center;gap:5px;list-style:none;font-variant-numeric:tabular-nums;transition:color .13s}
  .foot .fsum:hover{color:var(--muted)}
  .foot .fact{color:#4d5661;font-size:15px;cursor:pointer;padding:2px;border-radius:6px;transition:color .13s,background .13s;background:none;border:none}
  .foot .fact:hover{color:var(--muted);background:var(--hover)}
  details.foot-d{margin:0}
  details.foot-d>summary{list-style:none;cursor:pointer}
  details.foot-d>summary::-webkit-details-marker{display:none}
  details.foot-d .chev{transition:transform .15s}
  details.foot-d[open] .chev{transform:rotate(90deg)}
  details>summary::-webkit-details-marker{display:none}
  .disc{margin-top:9px}
  .disc>summary{cursor:pointer;font-size:12px;color:var(--hint);list-style:none;display:inline-flex;align-items:center;gap:6px}
  .disc>summary::-webkit-details-marker{display:none}
  .disc[open]>summary{color:var(--muted)}
  pre{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:10px;overflow:auto;
    font:12px/1.5 ui-monospace,"SF Mono",Consolas,monospace;color:#cdd3da;white-space:pre-wrap;word-break:break-word;margin:8px 0 0}
  .trace{margin-top:8px;display:flex;flex-direction:column;gap:1px}
  .tstep{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:3px 0}
  .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .tname{flex:1;color:var(--muted)}
  .tms{color:var(--hint);font-variant-numeric:tabular-nums}
  .chart img{max-width:100%;border-radius:10px;background:#fff;border:1px solid var(--border)}
  /* video grid */
  .vgrid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));margin:4px 0}
  .vcard{border:1px solid var(--border2);border-radius:12px;overflow:hidden;background:#0d1015;transition:border-color .13s}
  .vcard:hover{border-color:#39414d}
  .vcard .vhead{display:flex;align-items:center;gap:7px;padding:9px 11px;font-size:12.5px;font-weight:500;color:var(--text)}
  .vcard .vnum{font-size:10.5px;color:var(--accent-soft);background:var(--accent-dim);padding:1px 7px;border-radius:999px;flex-shrink:0;font-variant-numeric:tabular-nums}
  .vcard video{width:100%;max-height:360px;background:#000;display:block}
  .vcard .vna{padding:14px 11px;color:var(--hint);font-size:12.5px;display:flex;align-items:center;gap:7px}
  /* table */
  .tbl{margin:6px 0;border:1px solid var(--border2);border-radius:12px;overflow:hidden;background:#0d1015}
  .tbl .tbar{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--border)}
  .tbl .tscroll{max-height:420px;overflow:auto}
  .tbl table{width:100%;border-collapse:collapse;font-size:13px}
  .tbl th{text-align:left;padding:8px 13px;position:sticky;top:0;background:#12161c;border-bottom:1px solid var(--border);font-weight:500;white-space:nowrap;color:var(--muted)}
  .tbl td{padding:7px 13px;border-bottom:1px solid var(--border);vertical-align:top}
  .tbl tbody tr:hover{background:var(--hover)}
  .tbl .cnum{color:var(--hint);white-space:nowrap;text-align:right;font-variant-numeric:tabular-nums;width:1%}
  .tbl th{cursor:pointer;user-select:none}
  .barcell{display:flex;align-items:center;gap:8px}
  .bar{height:6px;border-radius:3px;background:var(--surface2);min-width:44px;flex:1}
  .bar>i{display:block;height:6px;border-radius:3px;background:var(--accent)}
  /* composer */
  .composer{display:flex;justify-content:center;padding:12px 18px 16px;border-top:1px solid var(--border)}
  .cwrap{flex:1;max-width:820px;display:flex;flex-direction:column;gap:8px}
  .box{display:flex;align-items:flex-end;gap:9px;background:var(--surface);border:1px solid var(--border2);border-radius:15px;padding:9px 11px;transition:border-color .15s}
  .box:focus-within{border-color:var(--accent)}
  .box .ibtn{background:none;border:none;color:var(--hint);cursor:pointer;font-size:18px;padding:4px;border-radius:8px;line-height:1;transition:color .13s,background .13s;flex-shrink:0}
  .box .ibtn:hover{color:var(--muted);background:var(--hover)}
  textarea{flex:1;border:none;background:transparent;color:var(--text);resize:none;font:14.5px/1.5 inherit;outline:none;max-height:150px;padding:4px 0}
  textarea::placeholder{color:var(--hint)}
  .send{width:32px;height:32px;border-radius:10px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .13s,transform .08s}
  .send:hover:not(:disabled){background:#4f88f5}
  .send:active:not(:disabled){transform:scale(.94)}
  .send:disabled{opacity:.4;cursor:not-allowed}
  .cfoot{display:flex;align-items:center;justify-content:space-between;padding:0 4px}
  .propill{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 11px;border-radius:999px;cursor:pointer;background:none;border:1px solid var(--border2);color:var(--muted);line-height:1.4;transition:color .13s,border-color .13s,background .13s}
  .propill:hover{color:var(--text);border-color:#3a3550;background:var(--hover)}
  .propill.on{background:var(--pro-dim);border-color:transparent;color:var(--pro)}
  .propill:disabled{opacity:.55;cursor:default}
  .cmon{display:inline-flex;align-items:center;gap:8px}
  .cm-txt{font-size:12px;color:var(--hint);font-variant-numeric:tabular-nums}
  .empty{color:var(--hint);text-align:center;margin:auto;font-size:14px;display:flex;flex-direction:column;align-items:center;gap:14px}
  .empty .ehero{display:flex;flex-direction:column;align-items:center;gap:10px}
  .empty .eic{width:46px;height:46px;border-radius:13px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;color:var(--accent-soft);font-size:23px}
  .empty .exs{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:560px}
  .empty .ex{padding:7px 13px;border:1px solid var(--border2);border-radius:999px;cursor:pointer;color:var(--muted);font-size:13px;transition:color .13s,border-color .13s,background .13s}
  .empty .ex:hover{color:var(--text);border-color:#3a414c;background:var(--hover)}
  .think{color:var(--hint);font-size:13px;display:flex;align-items:center;gap:9px}
  .breathe{width:8px;height:8px;border-radius:50%;background:var(--accent-soft);animation:breathe 1.1s ease-in-out infinite}
  @keyframes breathe{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.15)}}
</style></head>
<body><div class="shell" id="shell">
  <aside class="sidebar" id="sidebar">
    <div class="sb-top"><button class="btn newbtn" id="newchat"><i class="ti ti-plus" aria-hidden="true"></i>New chat</button></div>
    <div class="sb-h">Recents</div>
    <div class="convlist" id="convlist"></div>
  </aside>
  <div class="app">
    <header>
      <button class="icon-btn" id="toggle" aria-label="Toggle sidebar"><i class="ti ti-menu-2" aria-hidden="true"></i></button>
      <div class="logo"><i class="ti ti-player-play" aria-hidden="true"></i></div>
      <h1>VideoSense</h1>
      <span class="sess" id="sess"></span>
      <span class="spacer"></span>
    </header>
    <div class="thread" id="thread"></div>
    <div class="composer">
      <div class="cwrap">
        <div class="box">
          <button class="ibtn" id="upBtn" type="button" aria-label="Upload a video"
                  title="Upload your own video to analyze (temporary, expires; not added to the main library)"><i class="ti ti-upload" aria-hidden="true"></i></button>
          <input id="upFile" type="file" accept="video/*" style="display:none">
          <textarea id="q" rows="1" placeholder="Ask about your videos…"></textarea>
          <button class="send" id="send" aria-label="Send"><i class="ti ti-arrow-up" aria-hidden="true"></i></button>
        </div>
        <div class="cfoot">
          <button id="proPill" class="propill" type="button" aria-pressed="false"
                  title="Pro video analysis: watch-the-content questions use a stronger pro model (more accurate, slower). DB queries and counts are unaffected."><i class="ti ti-sparkles" aria-hidden="true"></i>Pro</button>
          <span class="cmon" title="Session cost so far ($) and cumulative tokens as a share of the context window (≈1M)">
            <span class="cm-txt" id="cmtxt"></span>
            <svg width="28" height="28" viewBox="0 0 30 30" aria-label="Context used">
              <circle cx="15" cy="15" r="12" fill="none" stroke="var(--border2)" stroke-width="2.5"></circle>
              <circle id="cmarc" cx="15" cy="15" r="12" fill="none" stroke="var(--pro)" stroke-width="2.5"
                      stroke-dasharray="75.4" stroke-dashoffset="75.4" stroke-linecap="round" transform="rotate(-90 15 15)"></circle>
              <text id="cmpct" x="15" y="18.4" text-anchor="middle" font-size="8.5" fill="var(--hint)">0%</text>
            </svg>
          </span>
        </div>
      </div>
    </div>
  </div>
  <div class="scrim" id="scrim"></div>
</div>
<script>
const $ = s => document.querySelector(s);
const thread = $('#thread');
const EXAMPLES = [
  "Find every video that contains skiing or snowboarding.",
  "What activities appear most across all videos?",
  "How many videos are in the database?",
];
// ── 本地会话历史(ChatGPT 式;存浏览器,后端按 session_id 续聊)──
const LS_CHATS='vs_chats_v1';
let chats = loadChats();   // [{id,title,updatedAt,messages:[{role,text?,data?,ms?}]}](newest-first)
let activeId = null;       // 当前打开的会话 id;null = 尚未落地的新对话(draft)
let activeDraft = 0;       // draft 身份序号(activeId 为 null 时区分"哪一个新对话")
let draftSeq = 0;          // draft 计数器
let sessionId = null;      // 发给后端的 session_id(= activeId)
let sending = false;       // in-flight 守卫:同一时刻只允许一个发送在途

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function el(html){const t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstElementChild;}
function scroll(){thread.scrollTop=thread.scrollHeight;}
function updateSess(){$('#sess').textContent = sessionId ? '· '+sessionId.slice(0,8) : '· New session';}

function showEmpty(){
  thread.innerHTML='';
  const e=el('<div class="empty"></div>');
  const hero=el('<div class="ehero"><div class="eic"><i class="ti ti-message-chatbot" aria-hidden="true"></i></div><div>Ask anything about your video library</div></div>');
  e.appendChild(hero);
  const exs=el('<div class="exs"></div>');
  EXAMPLES.forEach(x=>{const c=el('<span class="ex"></span>');c.textContent=x;c.onclick=()=>send(x);exs.appendChild(c);});
  e.appendChild(exs);
  thread.appendChild(e);
}

// ── 气泡 ──────────────────────────────────────────────
function addUser(text){
  if($('.empty'))thread.innerHTML='';
  const r=el('<div class="row user"></div>');
  const b=el('<div class="bubble"></div>'); b.textContent=text;
  r.appendChild(b); thread.appendChild(r); scroll();
}
function assistantShell(){
  const r=el('<div class="row"><div class="av"><i class="ti ti-sparkles" aria-hidden="true"></i></div></div>');
  const card=el('<div class="card"></div>'); r.appendChild(card);
  thread.appendChild(r); scroll(); return card;
}

// ── 富渲染:总入口 ──────────────────────────────────────
// 设计 frontend-ui-refresh:常态不宣告(去掉 follow-up/new/meta 徽章);
// 仅异常(refused)标徽章;trace/plan 收进卡片底部安静页脚(renderFooter)。
function renderAssistant(card, d, ms){
  card.innerHTML='';
  if(d.status==='refused'){
    card.appendChild(badge('refused','Declined'));
    card.appendChild(textBlock(d.reason||"I can't answer that."));
    return;
  }
  if(d.status==='error'){ card.appendChild(textBlock('Something went wrong: '+(d.error||''))); return; }
  if(d.status==='smalltalk'){ card.appendChild(answerBlock(d.answer||'')); card.appendChild(renderFooter(d,ms)); return; }

  // ok
  if(d.videos && d.videos.length){ card.appendChild(renderVideos(d.videos)); }
  if(d.table && d.table.rows && d.table.rows.length){ card.appendChild(renderTable(d.table)); }
  if(d.plot_url){ card.appendChild(renderChart(d.plot_url)); }
  else { card.appendChild(renderAnswer(d.answer)); }

  card.appendChild(renderFooter(d, ms));   // quiet footer: steps · time (expandable), plan/sql/code
}

function badge(cls,txt){const b=el('<span class="badge"></span>');b.classList.add(cls);b.textContent=txt;return b;}
function sub(txt){const s=el('<span class="sub"></span>');s.textContent=txt;return s;}
function textBlock(txt){const p=el('<div class="answer"></div>');p.textContent=txt;return p;}
function answerBlock(txt){const p=el('<div class="answer"></div>');p.textContent=txt;return p;}

// ── 答案分形:表格 / 统计卡 / 标量 / 文本 ──────────────
function renderAnswer(ans){
  if(ans==null) return textBlock('(empty)');
  if(typeof ans==='string') return textBlock(ans);
  if(Array.isArray(ans)){
    if(ans.length===0) return textBlock('No matching results.');
    if(typeof ans[0]==='object') return renderArrayTable(ans);
    return renderArrayTable(ans.map(v=>({value:v})));
  }
  if(typeof ans==='object') return renderStats(ans);
  return metric(ans);
}
function metric(v){const w=el('<div class="stats"></div>');w.appendChild(stat('Result',v));return w;}
function stat(k,v){const s=el('<div class="stat"></div>');s.appendChild(Object.assign(el('<div class="k"></div>'),{textContent:k}));
  const vv=el('<div class="v"></div>');vv.textContent=fmt(v);s.appendChild(vv);return s;}
function renderStats(obj){
  const w=el('<div class="stats"></div>');
  Object.entries(obj).forEach(([k,v])=>{
    if(v!=null && typeof v==='object'){ // 嵌套(如回归 params)→ 拍平成几条
      Object.entries(v).forEach(([k2,v2])=>w.appendChild(stat(k+'.'+k2,v2)));
    } else w.appendChild(stat(k,v));
  });
  return w;
}
function fmt(v){ if(typeof v==='number'){ return Number.isInteger(v)?v:(+v.toFixed(4)+'').replace(/\.?0+$/,''); } return String(v); }

// ── 表格:排序 + 置信度条 + CSV ─────────────────────────
function isConfCol(rows,k){
  if(!/conf|score|prob|r2|r_squared/i.test(k)) return false;
  return rows.every(r=>{const x=r[k];return x==null||(typeof x==='number'&&x>=0&&x<=1.0001);});
}
function renderArrayTable(rows){
  const wrap=el('<div class="tbl"></div>');
  const keys=[...new Set(rows.flatMap(r=>Object.keys(r)))];
  const confCols=new Set(keys.filter(k=>isConfCol(rows,k)));
  let sortK=null, sortDir=1, data=rows.slice();
  const scrl=el('<div class="tscroll"></div>');
  const tbl=el('<table></table>');
  function draw(){
    if(sortK!=null) data.sort((a,b)=>{const x=a[sortK],y=b[sortK];return (x>y?1:x<y?-1:0)*sortDir;});
    tbl.innerHTML='';
    const thead=el('<thead><tr></tr></thead>'), tr=thead.querySelector('tr');
    keys.forEach(k=>{const th=el('<th></th>');th.textContent=k+(sortK===k?(sortDir>0?' ▲':' ▼'):'');
      th.onclick=()=>{ if(sortK===k)sortDir*=-1; else {sortK=k;sortDir=1;} draw(); };
      tr.appendChild(th);});
    tbl.appendChild(thead);
    const tb=el('<tbody></tbody>');
    data.slice(0,200).forEach(r=>{
      const row=el('<tr></tr>');
      keys.forEach(k=>{const td=el('<td></td>'); const v=r[k];
        if(confCols.has(k)&&typeof v==='number'){
          const c=el('<div class="barcell"></div>'); const bar=el('<div class="bar"><i></i></div>');
          bar.querySelector('i').style.width=Math.round(v*100)+'%'; c.appendChild(bar);
          const n=el('<span></span>'); n.textContent=(+v.toFixed(2)); n.style.color='var(--muted)';
          c.appendChild(n); td.appendChild(c);
        } else td.textContent = v==null?'':fmt(v);
        row.appendChild(td);});
      tb.appendChild(row);
    });
    tbl.appendChild(tb);
  }
  draw();
  const bar=el('<div class="tbar"></div>');
  const n=el('<span></span>'); n.textContent=rows.length+' rows'+(rows.length>200?' · showing 200':'');
  bar.appendChild(n);
  const csv=el('<span class="lnk"><i class="ti ti-download" aria-hidden="true"></i>CSV</span>'); csv.onclick=()=>downloadCSV(rows); bar.appendChild(csv);
  wrap.appendChild(bar);
  scrl.appendChild(tbl); wrap.appendChild(scrl);
  return wrap;
}
function downloadCSV(rows){
  const keys=[...new Set(rows.flatMap(r=>Object.keys(r)))];
  const e=v=>{v=v==null?'':String(v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  const csv=[keys.join(','),...rows.map(r=>keys.map(k=>e(r[k])).join(','))].join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='videosense_result.csv'; a.click();
}

// ── 视频展示:内嵌 <video> 播放数据库里的视频/片段(show_video 节点产出)──────
function renderVideos(list){
  const wrap=el('<div class="vgrid"></div>');

// ── show_table:原始查询结果直接渲染成表格(不经大脑逐行复述)──────
function renderTable(t){
  const cols=t.columns||[], rows=t.rows||[];
  const wrap=el('<div class="tbl"></div>');
  const bar=el('<div class="tbar"></div>');
  const cnt=el('<span></span>');
  cnt.textContent=(t.caption?t.caption+' · ':'')+t.n+' rows'+(t.shown<t.n?(' · showing '+t.shown):'');
  bar.appendChild(cnt);
  const csvBtn=el('<span class="lnk"></span>');
  csvBtn.innerHTML='<i class="ti ti-download" aria-hidden="true"></i>CSV';
  csvBtn.onclick=()=>downloadCsv(cols, rows);
  bar.appendChild(csvBtn);
  wrap.appendChild(bar);
  const scroll=el('<div class="tscroll"></div>');
  const tbl=el('<table></table>');
  const thead=el('<thead></thead>'); const htr=el('<tr></tr>');
  htr.appendChild(Object.assign(el('<th class="cnum"></th>'),{textContent:'#'}));
  cols.forEach(c=>{ const th=el('<th></th>'); th.textContent=c; htr.appendChild(th); });
  thead.appendChild(htr); tbl.appendChild(thead);
  const tb=el('<tbody></tbody>');
  rows.forEach((r,i)=>{ const tr=el('<tr></tr>');
    tr.appendChild(Object.assign(el('<td class="cnum"></td>'),{textContent:(i+1)}));   // 1..N,用户可说「第 N 个」
    cols.forEach(c=>{ const td=el('<td></td>'); const v=r[c]; td.textContent=(v==null?'':String(v)); tr.appendChild(td); });
    tb.appendChild(tr); });
  tbl.appendChild(tb); scroll.appendChild(tbl); wrap.appendChild(scroll);
  return wrap;
}

function downloadCsv(cols, rows){
  const esc=v=>{ const s=(v==null?'':String(v)); return /[",\n]/.test(s)?('"'+s.replace(/"/g,'""')+'"'):s; };
  const lines=[cols.map(esc).join(',')];
  rows.forEach(r=>lines.push(cols.map(c=>esc(r[c])).join(',')));
  const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='table.csv';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}

// ── 安静页脚:一行 steps · time 摘要(点击展开完整 timeline);SQL/代码另收进 disclosure ──
// 设计 frontend-ui-refresh:元信息常态不宣告,细节按需展开。
function stepSummary(d, ms){
  const lo=d.loop||{}; const tc=lo.tool_calls||{};
  const parts=[];
  const nSteps = lo.steps!=null ? lo.steps : (d.trace?d.trace.length:0);
  if(nSteps) parts.push('Steps '+nSteps);
  const NAME={sql_query:'sql',analyze_video:'watch',show_video:'show',show_table:'table',
              web_search:'web',update_memory:'memory',python:'python',plot:'plot'};
  Object.entries(tc).forEach(([k,v])=>{ parts.push((NAME[k]||k)+(v>1?(' ×'+v):'')); });
  if(ms!=null) parts.push((ms/1000).toFixed(1)+'s');
  return parts.join(' · ');
}
function renderFooter(d, ms){
  const foot=el('<div class="foot"></div>');
  const hasTrace = d.trace && d.trace.length;
  const summaryTxt = stepSummary(d, ms) || (hasTrace?('Steps '+d.trace.length):'');
  if(hasTrace){
    const det=el('<details class="foot-d"></details>');
    const sm=el('<summary class="fsum"></summary>');
    sm.innerHTML='<i class="ti ti-chevron-right chev" aria-hidden="true"></i>';
    sm.appendChild(document.createTextNode(summaryTxt));
    det.appendChild(sm);
    det.appendChild(traceBlock(d.trace));
    foot.appendChild(det);
  } else if(summaryTxt){
    foot.appendChild(Object.assign(el('<span class="fsum"></span>'),{textContent:summaryTxt}));
  }
  foot.appendChild(el('<span style="flex:1"></span>'));
  // SQL / 生成代码:收进右侧 disclosure(默认收起)
  const sql = d.dag&&d.dag.nodes ? d.dag.nodes.map(n=>n.inputs&&n.inputs.sql).filter(Boolean).join('\n\n') : '';
  if(sql){ const b=footBtn('ti-database','View SQL'); b.onclick=()=>toggleDisc(foot,'sql',sql); foot.appendChild(b); }
  if(d.generated_code&&Object.keys(d.generated_code).length){
    const code=Object.entries(d.generated_code).map(([k,v])=>'# '+k+'\n'+v).join('\n\n');
    const b=footBtn('ti-code','View code'); b.onclick=()=>toggleDisc(foot,'code',code); foot.appendChild(b);
  }
  const copyB=footBtn('ti-copy',null); copyB.title='Copy answer';
  copyB.onclick=()=>{ try{navigator.clipboard.writeText(typeof d.answer==='string'?d.answer:JSON.stringify(d.answer,null,2));}catch(e){} };
  foot.appendChild(copyB);
  const wrap=el('<div></div>'); wrap.appendChild(foot); return wrap;
}
function footBtn(icon,txt){
  const b=el('<button class="fact"></button>'); b.innerHTML='<i class="ti '+icon+'" aria-hidden="true"></i>';
  if(txt){ b.style.cssText='font-size:11.5px;display:inline-flex;align-items:center;gap:4px;color:var(--hint)'; b.appendChild(document.createTextNode(txt)); }
  return b;
}
function toggleDisc(foot, kind, code){
  const wrap=foot.parentElement;
  const ex=wrap.querySelector('pre[data-k="'+kind+'"]');
  if(ex){ ex.remove(); return; }
  const pre=el('<pre></pre>'); pre.setAttribute('data-k',kind); pre.textContent=code; wrap.appendChild(pre);
}
function traceBlock(trace){
  const box=el('<div class="trace"></div>');
  const color={ok:'var(--ok)',error:'var(--danger)',retry:'var(--warn)',running:'var(--hint)'};
  trace.forEach(st=>{
    const row=el('<div class="tstep"></div>');
    const dot=el('<span class="dot"></span>'); dot.style.background=color[st.status]||'var(--hint)'; row.appendChild(dot);
    const nm=el('<span class="tname"></span>'); nm.textContent=st.name+(st.error?(' — '+st.error):''); row.appendChild(nm);
    const ms=el('<span class="tms"></span>'); ms.textContent=(st.elapsed_ms!=null?st.elapsed_ms+'ms':''); row.appendChild(ms);
    box.appendChild(row);
  });
  return box;
}

// ── 本地会话历史存取 ───────────────────────────────────
function loadChats(){ try{ return JSON.parse(localStorage.getItem(LS_CHATS))||[]; }catch(e){ return []; } }
function saveChats(){
  while(true){
    try{ localStorage.setItem(LS_CHATS, JSON.stringify(chats)); return; }
    catch(e){                                 // 配额超限:逐步裁剪后重试,绝不静默丢当前会话
      let idx=-1;                             // 先删最旧的【非当前】会话
      for(let i=chats.length-1;i>=0;i--){ if(chats[i].id!==activeId){ idx=i; break; } }
      if(idx>=0){ chats.splice(idx,1); continue; }
      const a=chats[0];                       // 只剩当前会话仍超限 → 砍它最旧的两条消息
      if(a && a.messages.length>2){ a.messages.splice(0,2); continue; }
      return;                                 // 实在存不下 → 放弃本轮持久化(不抛错)
    }
  }
}
function activeChat(){ return chats.find(c=>c.id===activeId)||null; }
function titleOf(t){ t=String(t||'').trim().replace(/\s+/g,' '); return t ? (t.length>42?t.slice(0,42)+'…':t) : 'New chat'; }

// ── 侧栏渲染 ───────────────────────────────────────────
function renderSidebar(){
  const list=$('#convlist'); list.innerHTML='';
  if(!chats.length){ list.appendChild(el('<div class="sb-empty">No conversations yet.<br>Ask a question to start one.</div>')); return; }
  chats.forEach(c=>{
    const row=el('<div class="conv"></div>'); if(c.id===activeId) row.classList.add('active');
    const t=el('<span class="title"></span>'); t.textContent=c.title; row.appendChild(t);
    const x=el('<span class="del" title="Delete"><i class="ti ti-x" aria-hidden="true"></i></span>'); row.appendChild(x);
    row.onclick=()=>openChat(c.id);
    x.onclick=(e)=>deleteChat(c.id, e);
    list.appendChild(row);
  });
}

// ── 新对话 / 打开 / 删除 ───────────────────────────────
function newChat(){
  activeId=null; activeDraft=++draftSeq; sessionId=null; updateSess();
  convTok=0; convCost=0; renderMonitor();        // 新对话:累计归零
  renderSidebar(); showEmpty(); $('#q').focus();
  if(window.innerWidth<=720) $('#shell').classList.add('nosb');   // 移动端开新对话即收起侧栏
}
function openChat(id){
  const c=chats.find(x=>x.id===id); if(!c) return;
  activeId=id; activeDraft=0; sessionId=id; updateSess();
  thread.innerHTML='';
  if(!c.messages.length){ showEmpty(); }
  else c.messages.forEach(m=>{
    if(m.role==='user') addUser(m.text);
    else { const card=assistantShell(); renderAssistant(card, m.data, m.ms); }
  });
  monitorFromChat(c);                            // 恢复该会话的累计 token/成本
  renderSidebar(); scroll();
  if(window.innerWidth<=720) $('#shell').classList.add('nosb');   // 移动端选完自动收起
}
function deleteChat(id, ev){
  if(ev) ev.stopPropagation();
  chats=chats.filter(c=>c.id!==id); saveChats();
  if(activeId===id) newChat(); else renderSidebar();
}

// ── 发送 ──────────────────────────────────────────────
// SSE 流式消费(M6b):POST → 读 ReadableStream → 逐条 data: 事件;step/answer 给进度,result 给最终。
// dag 路径不发 step 事件,只收 result —— 自动降级为"转圈到出结果"。
async function streamQuery(q, sentSid, onEvent){
  const r=await fetch('/v1/video_vibe_query/stream',{method:'POST',
    headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:q, session_id:sentSid, pro_video:proOn})});
  if(!r.ok || !r.body) throw new Error('stream HTTP '+r.status);
  const reader=r.body.getReader(), dec=new TextDecoder();
  let buf='', result=null;
  for(;;){
    const {value,done}=await reader.read(); if(done) break;
    buf+=dec.decode(value,{stream:true});
    let i;
    while((i=buf.indexOf('\n\n'))>=0){
      const block=buf.slice(0,i); buf=buf.slice(i+2);
      const line=block.split('\n').find(l=>l.startsWith('data:')); if(!line) continue;
      let ev; try{ ev=JSON.parse(line.slice(5).trim()); }catch(e){ continue; }
      if(ev.type==='result') result=ev.result; else onEvent(ev);
    }
  }
  return result;
}
async function send(text){
  const q = text!=null ? text : $('#q').value.trim();
  if(!q || sending) return;                    // in-flight 守卫:防狂按 Enter 重复发、并发建重复会话
  sending=true;
  $('#q').value=''; autosize(); addUser(q);
  $('#send').disabled=true;
  const card=assistantShell();
  const think=el('<div class="think"><span class="breathe"></span><span class="tmsg">Thinking…</span></div>');
  const steps=el('<div class="trace" style="margin-top:6px"></div>');
  card.appendChild(think); card.appendChild(steps);
  const onEvent=(ev)=>{
    if(ev.type==='step'){
      think.querySelector('.tmsg').textContent='Working · step '+(ev.step+1);
      (ev.tools||[]).forEach(t=>{
        const row=el('<div class="tstep"></div>');
        const dot=el('<span class="dot"></span>'); dot.style.background=t.ok?'var(--ok)':'var(--danger)'; row.appendChild(dot);
        const nm=el('<span class="tname"></span>'); nm.textContent=t.tool; row.appendChild(nm);
        steps.appendChild(row);
      });
      scroll();
    } else if(ev.type==='answer'){ think.querySelector('.tmsg').textContent='Writing answer…'; }
  };
  const t0=performance.now();
  const originId=activeId, originDraft=activeDraft, sentSid=sessionId;   // 快照:发起时的归属
  try{
    const d=await streamQuery(q, sentSid, onEvent) || {status:'error', error:'no result'};
    const ms=Math.round(performance.now()-t0);
    updateContext(d);
    // 路由到【发起时】的会话,而非 await 后的当前会话 —— 中途切换/删除都不会错配
    let c = originId ? chats.find(x=>x.id===originId) : chats.find(x=>x.id===d.session_id);
    if(!originId && !c){                        // draft 首次落地 → 新建(用后端 session_id 当 id)
      c={ id: d.session_id || ('local-'+Date.now()), title: titleOf(q), updatedAt: Date.now(), messages: [] };
    }
    if(c){
      if(d.session_id && c.id!==d.session_id) c.id=d.session_id;   // 对齐后端 session_id(过期/重建)
      c.messages.push({role:'user', text:q});
      c.messages.push({role:'assistant', data:d, ms});
      c.updatedAt=Date.now();
      chats=[c, ...chats.filter(x=>x!==c)];     // 最近活跃置顶
      saveChats();
      // 仅当用户仍停留在发起时的会话,才动全局 + 高亮(否则结果只入库,重开即见)
      const stillHere = originId ? (activeId===originId) : (activeId===null && activeDraft===originDraft);
      if(stillHere){ activeId=c.id; activeDraft=0; sessionId=c.id; updateSess(); }
      renderSidebar();
    }
    // c 为空且非 draft → 目标会话在 await 期间被删了 → 丢弃结果,不复活
    renderAssistant(card, d, ms);               // card 若已随切换分离则不可见,符合预期(已入库)
  }catch(e){ card.innerHTML=''; card.appendChild(textBlock('Request failed: '+e)); }
  finally{ sending=false; $('#send').disabled=false; $('#q').focus(); scroll(); }
}
function autosize(){const t=$('#q'); t.style.height='auto'; t.style.height=Math.min(t.scrollHeight,140)+'px';}

// ── 事件 / 初始化 ──────────────────────────────────────
$('#send').onclick=()=>send();
$('#newchat').onclick=newChat;
$('#toggle').onclick=()=>$('#shell').classList.toggle('nosb');
$('#scrim').onclick=()=>$('#shell').classList.add('nosb');
$('#q').addEventListener('input',autosize);
$('#q').addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} });

// ── Pro 模式开关 + 本会话累计监控(成本 $ + 累计 token 占窗口环)──
let proOn=false;
$('#proPill').onclick=()=>{ proOn=!proOn; const p=$('#proPill'); p.classList.toggle('on',proOn); p.setAttribute('aria-pressed',proOn?'true':'false'); };

// M5:上传自己的视频 → 拿 PUT 签名 URL 直传 GCS → 把临时 video_id 填进输入框,可直接提问
$('#upBtn').onclick=()=>$('#upFile').click();
$('#upFile').onchange=async(e)=>{
  const f=e.target.files[0]; if(!f) return;
  const btn=$('#upBtn'), old=btn.innerHTML; btn.innerHTML='<i class="ti ti-loader-2" aria-hidden="true"></i>'; btn.disabled=true;
  try{
    const r=await fetch('/v1/upload_url',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({content_type:f.type||'video/mp4'})});
    if(!r.ok){ alert('Upload request failed: '+r.status+' '+(await r.text())); return; }
    const d=await r.json();
    const put=await fetch(d.upload_url,{method:'PUT',body:f,
      headers:{'Content-Type':d.content_type,'x-goog-content-length-range':'0,'+d.max_bytes}}); // 大小上限已签进 URL
    if(!put.ok){ alert('Upload failed: '+put.status+' (may exceed the size limit)'); return; }
    const q=$('#q'); q.value=`I uploaded a video (${d.video_id}), `; q.focus(); // 预填 → 用户接着问
    btn.innerHTML='<i class="ti ti-check" aria-hidden="true"></i>';
  }catch(err){ alert('Upload error: '+err); }
  finally{ btn.disabled=false; e.target.value=''; setTimeout(()=>{btn.innerHTML=old;},2000); }
};
function fmtTok(n){ return n>=1000 ? (n/1000).toFixed(n>=10000?0:1)+'k' : String(Math.round(n||0)); }
let convTok=0, convCost=0;
const CTX_WINDOW=1000000;        // 模型上下文窗口(flash≈1M)—— 累计 token 占比基准
function renderMonitor(){
  const txt=$('#cmtxt');
  if(txt) txt.textContent = convTok>0 ? ('$'+convCost.toFixed(4)+' · '+fmtTok(convTok)+' tok') : '';
  const pct=Math.max(0,Math.min(100, Math.round(convTok/CTX_WINDOW*100)));
  const arc=$('#cmarc'), p=$('#cmpct');
  if(arc) arc.setAttribute('stroke-dashoffset', (75.4*(1-pct/100)).toFixed(1));
  if(p) p.textContent = pct+'%';
}
function updateContext(d){       // 每轮:把本轮 token/成本累加进本会话
  const u=(d&&d.usage)||{};
  convTok += u.tokens_total||0;
  convCost += u.cost_usd||0;
  renderMonitor();
}
function monitorFromChat(c){     // 切换/打开会话:从该会话历史重算累计
  convTok=0; convCost=0;
  if(c&&c.messages) c.messages.forEach(m=>{ const u=m.data&&m.data.usage; if(u){ convTok+=u.tokens_total||0; convCost+=u.cost_usd||0; } });
  renderMonitor();
}

renderSidebar();
if(chats.length) openChat(chats[0].id); else newChat();
if(window.innerWidth<=720) $('#shell').classList.add('nosb');
