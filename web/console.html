<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>VideoSense · Loop Console</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{ --bg:#f5f6f8; --card:#ffffff; --line:#e4e7ec; --txt:#1c2430; --dim:#6b7684;
         --acc:#2563eb; --brain:#7c3aed; --ok:#16a34a; --bad:#dc2626; --amber:#b45309;
         --brain-bg:#f7f4ff; --ok-bg:#f2fbf5; --code-bg:#f2f4f7; }
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg);color:var(--txt);
       font:14px/1.65 system-ui,-apple-system,"Segoe UI",sans-serif}
  code,pre,.mono{font-family:ui-monospace,Consolas,monospace}
  header{display:flex;align-items:baseline;gap:14px;padding:14px 24px;background:var(--card);
         border-bottom:1px solid var(--line)}
  header h1{font-size:16px;font-weight:650}
  header .sub{color:var(--dim);font-size:12.5px}
  header .refresh{margin-left:auto;color:var(--acc);font-size:13px;cursor:pointer}
  main{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 53px)}

  /* ── 左栏:请求列表 ── */
  #list{background:var(--card);border-right:1px solid var(--line);overflow-y:auto}
  .lhead{padding:12px 16px 6px;color:var(--dim);font-size:11.5px;letter-spacing:.04em;text-transform:uppercase}
  .item{padding:10px 16px;border-left:3px solid transparent;cursor:pointer}
  .item:hover{background:#f8f9fb}
  .item.on{background:#eef3fe;border-left-color:var(--acc)}
  .item .q{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-weight:500}
  .item .meta{color:var(--dim);font-size:12px;margin-top:2px}
  .empty{color:var(--dim);padding:48px 24px;text-align:center}

  /* ── 右栏:详情 ── */
  #detail{overflow-y:auto;padding:22px 30px;max-width:1100px}
  .qtitle{font-size:18px;font-weight:650;margin-bottom:12px}
  .stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-size:12.5px;color:var(--dim)}
  .stat b{color:var(--txt);font-weight:600}
  .sec-h{font-size:12px;color:var(--dim);letter-spacing:.06em;text-transform:uppercase;margin:22px 0 10px}

  /* 对话流 */
  .turn{position:relative;padding:0 0 18px 30px}
  .turn::before{content:'';position:absolute;left:9px;top:6px;bottom:-2px;width:2px;background:var(--line)}
  .turn:last-of-type::before{bottom:auto;height:14px}
  .turn .knot{position:absolute;left:0;top:2px;width:20px;height:20px;border-radius:50%;
              background:var(--brain);color:#fff;font-size:10.5px;display:flex;align-items:center;
              justify-content:center;font-weight:700}
  .headline{font-weight:600;color:var(--brain);margin-bottom:6px}
  .headline .lbl{color:var(--dim);font-weight:500;font-size:12px;margin-right:8px}
  details{border:1px solid var(--line);border-radius:8px;background:var(--card);margin-bottom:6px}
  details summary{padding:7px 12px;cursor:pointer;color:var(--dim);font-size:13px;list-style:none;display:flex;align-items:center;gap:8px}
  details summary::before{content:'▸';color:var(--dim);font-size:11px;transition:transform .12s}
  details[open] summary::before{transform:rotate(90deg)}
  details .body{padding:4px 14px 12px}
  .brain-full{background:var(--brain-bg);border-color:#e6ddfa}
  .brain-full .body{white-space:pre-wrap;color:#3c3357;font-size:13.5px}
  .nudge{background:#fffaf0;border:1px solid #f3e3c3;border-radius:8px;color:var(--amber);
         padding:7px 12px;font-size:13px;margin-bottom:6px}

  /* 工具行 */
  .tool-row summary .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .tool-row.ok summary .dot{background:var(--ok)}
  .tool-row.bad summary .dot{background:var(--bad)}
  .tool-row summary b{color:var(--acc);font-weight:600;font-family:ui-monospace,Consolas,monospace;font-size:13px}
  .tool-row summary .one{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
                          color:var(--dim);font-size:12.5px;font-family:ui-monospace,Consolas,monospace}
  .tool-row summary .ms{color:var(--dim);font-size:12px;flex-shrink:0}
  .tool-row .body label{display:block;color:var(--dim);font-size:11.5px;letter-spacing:.04em;
                        text-transform:uppercase;margin:8px 0 4px}
  .tool-row pre{background:var(--code-bg);border-radius:6px;padding:8px 10px;font-size:12.5px;
                white-space:pre-wrap;overflow-wrap:anywhere;color:#343e4e}
  .badge{font-size:11px;border-radius:5px;padding:1px 6px;background:#eef3fe;color:var(--acc);flex-shrink:0}

  /* 答案 */
  .answer{background:var(--ok-bg);border:1px solid #d3edd9;border-radius:10px;padding:14px 18px;white-space:pre-wrap}
  .runtime{white-space:pre-wrap;color:var(--dim);font-size:13px}
</style>
</head>
<body>
<header>
  <h1>Loop Console</h1>
  <span class="sub">大脑每轮的思考与出手 · 最近 50 次请求 · 进程内存(每 worker/实例各一份,重启即清)</span>
  <span class="refresh" onclick="load(true)">↻ 刷新</span>
</header>
<main>
  <div id="list"><div class="empty">加载中…</div></div>
  <div id="detail"><div class="empty">← 选择一次请求</div></div>
</main>
<script>
let cur = null, lastPayload = '';
async function load(force) {
  const r = await fetch('/v1/console/traces'); const d = await r.json();
  const payload = JSON.stringify(d) + '|' + cur;
  if (!force && payload === lastPayload) return;   // 数据没变不重绘(防点击目标被轮询销毁)
  lastPayload = payload;
  const el = document.getElementById('list');
  if (!d.traces.length) { el.innerHTML = '<div class="empty">还没有请求记录 —— 去主页问一个问题再回来</div>'; return; }
  el.innerHTML = '<div class="lhead">最近请求</div>' + d.traces.map(t => `
    <div class="item ${t.id===cur?'on':''}" data-id="${esc(t.id)}">
      <div class="q">${esc(t.query)}</div>
      <div class="meta">${esc(t.ts)} · ${esc(t.owner)} · ${Number(t.n_steps)} 步 · ${sec(t.total_ms)}</div>
    </div>`).join('');
  el.querySelectorAll('.item').forEach(it => it.addEventListener('click', () => show(it.dataset.id)));
}

async function show(id) {
  cur = id; load();
  const r = await fetch('/v1/console/trace/' + encodeURIComponent(id));
  if (!r.ok) { document.getElementById('detail').innerHTML = '<div class="empty">这条记录不在本实例或已滚出环</div>'; return; }
  const t = await r.json();
  const p = t.prompt || {};
  document.getElementById('detail').innerHTML = `
    <div class="qtitle">${esc(t.query)}</div>
    <div class="stats">
      <span class="stat">总耗时 <b>${sec(t.total_ms)}</b></span>
      <span class="stat">其中工具 <b>${sec(t.tool_ms)}</b></span>
      <span class="stat"><b>${(t.turns||[]).length}</b> 轮 · <b>${Number(t.n_steps)}</b> 步</span>
      <span class="stat">终止 <b>${esc(t.terminated)}</b></span>
      <span class="stat">静态前缀 <b>${fmt(p.system_chars)}</b> 字</span>
      <span class="stat">教训 <b>${p.lessons_count ?? 0}</b> 条</span>
      <span class="stat">schema <b>${fmt(p.schema_chars)}</b> 字</span>
      <span class="stat">多轮回放 <b>${fmt(p.replay_chars)}</b> 字</span>
      ${t.scrub_hits ? `<span class="stat">清洗命中 <b>${Number(t.scrub_hits)}</b></span>` : ''}
    </div>
    ${p.runtime_facts ? `<details><summary>运行时事实(这一轮注入给大脑的实时状态)</summary>
      <div class="body runtime">${esc(p.runtime_facts)}</div></details>` : ''}
    <div class="sec-h">决策流 —— 每轮:大脑想什么 → 出手 → 收到什么</div>
    ${renderFlow(t)}
    <div class="sec-h">最终答案(已清洗,用户看到的)</div>
    <div class="answer">${esc(t.answer || '(空)')}</div>`;
}

function renderFlow(t) {
  const turns = t.turns || [];
  if (!turns.length)                       // 旧记录(升级前)没有 turns —— 退回平铺步骤
    return (t.steps||[]).map(toolRow).join('') || '<div class="empty">纯文本收敛,没调工具</div>';
  return turns.map(tn => {
    const { head, body } = splitBrain(tn.brain);
    return `
    <div class="turn">
      <div class="knot">${Number(tn.i)+1}</div>
      ${tn.nudge ? `<div class="nudge">⚙ 系统回喂:${esc(tn.nudge)}</div>` : ''}
      <div class="headline"><span class="lbl">🧠 这轮在想</span>${esc(head)}</div>
      ${body ? `<details class="brain-full"><summary>完整思考</summary><div class="body">${esc(body)}</div></details>` : ''}
      ${(tn.steps||[]).map(toolRow).join('')}
      ${!(tn.steps||[]).length && !tn.nudge ? '<div style="color:var(--dim);font-size:13px">(这轮没出手 → 直接收敛作答)</div>' : ''}
    </div>`;
  }).join('');
}

function toolRow(s) {
  return `<details class="tool-row ${s.ok?'ok':'bad'}">
    <summary><span class="dot"></span><b>${esc(s.tool)}</b>
      ${s.cache_hit?'<span class="badge">⚡缓存</span>':''}${s.sub?'<span class="badge">⇶扇出</span>':''}
      <span class="one">${esc(oneLine(s.args))}</span><span class="ms">${sec(s.ms)}</span></summary>
    <div class="body">
      <label>它给工具的完整参数</label><pre>${esc(s.args || '(无)')}</pre>
      <label>回喂给大脑的结果 ${s.rows!=null?`(${Number(s.rows)} 行)`:''}</label><pre>${esc(s.out || (s.ok?'(空)':'(失败,无输出)'))}</pre>
    </div>
  </details>`;
}

// 思考摘要拆分:Gemini 摘要通常以 **标题** 开头 —— 标题当"这轮在想"一句话,其余收进"完整思考"
function splitBrain(brain) {
  const b = (brain || '').trim();
  if (!b) return { head: '(这轮没留思考,直接出手)', body: '' };
  const m = b.match(/^\*\*(.+?)\*\*\s*/);
  if (m) return { head: m[1], body: b.slice(m[0].length).trim() };
  const nl = b.indexOf('\n');
  const first = nl > -1 ? b.slice(0, nl) : b;
  if (first.length <= 110) return { head: first, body: nl > -1 ? b.slice(nl).trim() : '' };
  return { head: first.slice(0, 110) + '…', body: b };
}

function oneLine(s){ return String(s ?? '').replace(/\s+/g, ' ').slice(0, 160); }
function sec(ms){ const n = Number(ms) || 0; return n >= 1000 ? (n/1000).toFixed(1) + 's' : Math.round(n) + 'ms'; }
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function fmt(n){return (n??0).toLocaleString()}
load(); setInterval(load, 8000);
</script>
</body>
</html>
