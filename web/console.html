<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>VideoSense · Loop Console</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { --bg:#0b0e13; --panel:#121722; --line:#1f2734; --txt:#d7dee8; --dim:#8a94a5;
          --ok:#3fb27f; --bad:#e05d5d; --acc:#5b8def; --chip:#1a2230; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--txt); font:13px/1.55 ui-monospace,Consolas,monospace; }
  header { padding:14px 20px; border-bottom:1px solid var(--line); display:flex; gap:12px; align-items:baseline; }
  header h1 { font-size:15px; } header .dim { color:var(--dim); font-size:12px; }
  main { display:grid; grid-template-columns:340px 1fr; height:calc(100vh - 49px); }
  #list { border-right:1px solid var(--line); overflow-y:auto; }
  .item { padding:10px 14px; border-bottom:1px solid var(--line); cursor:pointer; }
  .item:hover, .item.on { background:var(--panel); }
  .item .q { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .item .meta { color:var(--dim); font-size:11px; margin-top:2px; }
  #detail { overflow-y:auto; padding:18px 22px; }
  .sec { margin-bottom:18px; }
  .sec h2 { font-size:12px; color:var(--dim); text-transform:uppercase; letter-spacing:.08em; margin-bottom:8px; }
  .prompt-bar { display:flex; gap:6px; flex-wrap:wrap; }
  .chip { background:var(--chip); border:1px solid var(--line); border-radius:6px; padding:4px 10px; font-size:12px; }
  .chip b { color:var(--acc); }
  .step { display:grid; grid-template-columns:26px 130px 1fr 70px; gap:10px; padding:8px 10px;
          border:1px solid var(--line); border-radius:8px; margin-bottom:6px; background:var(--panel); }
  .step .dot { text-align:center; } .ok { color:var(--ok); } .bad { color:var(--bad); }
  .step .tool { color:var(--acc); }
  .step .io { color:var(--dim); overflow-wrap:anywhere; }
  .step .io .out { color:var(--txt); opacity:.85; display:block; margin-top:2px; }
  .step .io .out b { color:var(--dim); font-weight:normal; }
  .step .ms { text-align:right; color:var(--dim); }
  .sub { border-left:3px solid var(--acc); }
  .turn { border-left:2px solid #6b5aa5; padding-left:12px; margin-bottom:14px; }
  .turn .brain { white-space:pre-wrap; margin-bottom:8px; color:#cfc2f0; }
  .turn .brain .tno { color:var(--dim); font-size:11px; margin-right:8px; }
  .turn .brain .quiet { color:var(--dim); font-style:italic; }
  .turn .nudge { color:var(--dim); background:var(--chip); border:1px dashed var(--line);
                 border-radius:6px; padding:6px 10px; margin-bottom:8px; white-space:pre-wrap; }
  .conv-final { border-left:2px solid var(--ok); padding-left:12px; }
  .answer { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:12px 14px; white-space:pre-wrap; }
  .rt { color:var(--dim); white-space:pre-wrap; font-size:12px; }
  .empty { color:var(--dim); padding:40px; text-align:center; }
</style>
</head>
<body>
<header>
  <h1>Loop Console</h1>
  <span class="dim">大脑每一步的决策全息 · 最近 50 次请求 · 进程内存(每 worker/实例各一份,重启即清)</span>
  <span class="dim" style="margin-left:auto;cursor:pointer" onclick="load()">↻ 刷新</span>
</header>
<main>
  <div id="list"><div class="empty">加载中…</div></div>
  <div id="detail"><div class="empty">← 选择一次请求</div></div>
</main>
<script>
let cur = null, lastPayload = '';
async function load(force) {
  const r = await fetch('/v1/console/traces'); const d = await r.json();
  const payload = JSON.stringify(d) + '|' + cur;
  if (!force && payload === lastPayload) return;   // 数据没变不重绘(防点击目标被轮询销毁)
  lastPayload = payload;
  const el = document.getElementById('list');
  if (!d.traces.length) { el.innerHTML = '<div class="empty">还没有请求记录 —— 去主页问一个问题再回来</div>'; return; }
  el.innerHTML = d.traces.map(t => `
    <div class="item ${t.id===cur?'on':''}" data-id="${esc(t.id)}">
      <div class="q">${esc(t.query)}</div>
      <div class="meta">${esc(t.ts)} · ${esc(t.owner)} · ${Number(t.n_steps)} 步 · 总${Number(t.total_ms)}ms · ${esc(t.terminated)}</div>
    </div>`).join('');
  el.querySelectorAll('.item').forEach(it => it.addEventListener('click', () => show(it.dataset.id)));
}
async function show(id) {
  cur = id; load();
  const r = await fetch('/v1/console/trace/' + encodeURIComponent(id));
  if (!r.ok) { document.getElementById('detail').innerHTML = '<div class="empty">这条记录不在本实例或已滚出环</div>'; return; }
  const t = await r.json();
  const p = t.prompt || {};
  document.getElementById('detail').innerHTML = `
    <div class="sec"><h2>问题</h2><div>${esc(t.query)}</div></div>
    <div class="sec"><h2>这一轮大脑装了什么(prompt 构成)</h2>
      <div class="prompt-bar">
        <span class="chip">静态前缀(宪法+教训+事实) <b>${fmt(p.system_chars)}</b> 字</span>
        <span class="chip">教训 <b>${p.lessons_count}</b> 条</span>
        <span class="chip">库 schema <b>${fmt(p.schema_chars)}</b> 字</span>
        <span class="chip">多轮回放 <b>${fmt(p.replay_chars)}</b> 字</span>
      </div>
      ${p.runtime_facts ? `<div class="rt" style="margin-top:8px">运行时事实:\n${esc(p.runtime_facts)}</div>` : ''}
    </div>
    <div class="sec"><h2>决策对话流(${(t.turns||[]).length} 轮 ${Number(t.n_steps)} 步 · 总 ${Number(t.total_ms)}ms,其中工具 ${Number(t.tool_ms)}ms · 终止:${esc(t.terminated)})</h2>
      ${renderFlow(t)}
    </div>
    <div class="sec conv-final"><h2>🧠 收敛 → 最终答案(已清洗${t.scrub_hits ? ` · 清洗命中 ${t.scrub_hits}` : ''})</h2>
      <div class="answer">${esc(t.answer||'(空)')}</div></div>`;
}
function stepCard(s) {
  return `<div class="step ${s.sub?'sub':''}">
      <div class="dot ${s.ok?'ok':'bad'}">${s.ok?'●':'✕'}</div>
      <div class="tool">${esc(s.tool)}${s.cache_hit?' ⚡cache':''}${s.sub?' ⇶扇出':''}</div>
      <div class="io">${esc(s.args||'')}${s.out?`<span class="out"><b>回喂给大脑 →</b> ${esc(s.out)} ${s.rows!=null?`(${s.rows} 行)`:''}</span>`:''}</div>
      <div class="ms">${Number(s.ms)}ms</div>
    </div>`;
}
function renderFlow(t) {
  const turns = t.turns || [];
  if (!turns.length)                       // 旧记录(升级前)没有 turns —— 退回平铺步骤
    return (t.steps||[]).map(stepCard).join('') || '<div class="dim">纯文本收敛,没调工具</div>';
  return turns.map(tn => `
    <div class="turn">
      ${tn.nudge ? `<div class="nudge">⚙ 系统回喂:${esc(tn.nudge)}</div>` : ''}
      <div class="brain"><span class="tno">第 ${Number(tn.i)+1} 轮 · 🧠 大脑决策</span>${tn.brain ? esc(tn.brain) : '<span class="quiet">(这轮没写理由,直接出手)</span>'}</div>
      ${(tn.steps||[]).map(stepCard).join('')}
    </div>`).join('');
}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function fmt(n){return (n??0).toLocaleString()}
load(); setInterval(load, 8000);
</script>
</body>
</html>
