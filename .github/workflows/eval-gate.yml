# 评测门：改了大脑相关代码或题库，合并前必须过（全离线，不要任何云凭证、零花费）。
# 挡的是三类事故：判分器/机器坏了、金标配置错了、必过题被改挂了。
# 真跑（真 Gemini）不在这跑 —— 那个要凭证和钱，用本地 `eval live` 或手动触发。
#
# 触发改成【所有 PR】：gate 是 required 检查，带 paths 过滤时 docs-only PR 的检查
# 永远不报告 → 合并死锁（2026-07-16 PR #116 踩到）。现在每个 PR 都报告：
# 触碰大脑路径 → 全量跑；没触碰 → 首步判定后直接放行（秒级、零花费）。
name: eval-gate

on:
  pull_request:
  workflow_dispatch: {}

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      REPL_USE_MOCK_DB: "1"
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 判定是否触碰大脑路径（docs-only 直接放行）
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          git fetch -q origin "${{ github.base_ref }}" --depth=1
          if git diff --name-only "origin/${{ github.base_ref }}...HEAD" \
              | grep -qE '^(pipeline|evals|tests|repl|perception)/'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "未触碰大脑路径 —— gate 放行（docs/资产类改动）"
          fi
      - uses: actions/setup-python@v5
        if: steps.diff.outputs.run == 'true'
        with:
          python-version: "3.11"
          cache: pip
      - name: 装依赖
        if: steps.diff.outputs.run == 'true'
        run: |
          pip install -r requirements.txt -r requirements-dev.txt pytest
      - name: 单测（含判分器金答案回放）
        if: steps.diff.outputs.run == 'true'
        run: python -m pytest tests/ -q
      - name: 题库校验（金标对得上 + 配置自洽）
        if: steps.diff.outputs.run == 'true'
        run: python -m evals.validate_tasks
      - name: 脚本车道跑通（评测机器自检，必过题硬门）
        if: steps.diff.outputs.run == 'true'
        run: python -m evals.runner
