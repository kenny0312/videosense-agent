# 评测门：改了大脑相关代码或题库，合并前必须过（全离线，不要任何云凭证、零花费）。
# 挡的是三类事故：判分器/机器坏了、金标配置错了、必过题被改挂了。
# 真跑（真 Gemini）不在这跑 —— 那个要凭证和钱，用本地 `eval live` 或手动触发。
name: eval-gate

on:
  pull_request:
    paths:
      - "pipeline/**"
      - "evals/**"
      - "tests/**"
      - "repl/**"
      - "perception/**"
  workflow_dispatch: {}

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      REPL_USE_MOCK_DB: "1"
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: 装依赖
        run: |
          pip install -r requirements.txt -r requirements-dev.txt pytest
      - name: 单测（含判分器金答案回放）
        run: python -m pytest tests/ -q
      - name: 题库校验（金标对得上 + 配置自洽）
        run: python -m evals.validate_tasks
      - name: 脚本车道跑通（评测机器自检，必过题硬门）
        run: python -m evals.runner
